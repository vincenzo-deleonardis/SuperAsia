<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>SuperAsia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;}
canvas#gameCanvas{display:block;}

/* Speed Lines Overlay */
#speedLines{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;opacity:0;transition:opacity .2s;}
#speedLines .line{position:absolute;background:rgba(255,255,255,0.25);filter:blur(1px);}
#speedLines .line.left{left:0;width:4px;}
#speedLines .line.right{right:0;width:4px;}

/* Vignette Flash */
#vignette{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:11;opacity:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(255,0,0,0.7) 100%);transition:opacity .15s;}

/* HUD */
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20;}
#timer{position:absolute;top:20px;left:20px;color:#fff;font-size:28px;font-weight:bold;text-shadow:2px 2px 6px rgba(0,0,0,0.8);}
#bestTime{position:absolute;top:20px;right:20px;color:#ffd700;font-size:20px;font-weight:bold;text-shadow:2px 2px 6px rgba(0,0,0,0.8);}
#speedometer{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);}
#speedCanvas{width:200px;height:110px;}
#progressBar{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:300px;height:12px;background:rgba(0,0,0,0.5);border-radius:6px;border:1px solid rgba(255,255,255,0.3);overflow:hidden;}
#progressFill{height:100%;width:0%;background:linear-gradient(90deg,#ff6ec7,#ffd700);border-radius:6px;transition:width .2s;}
#progressLabel{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);color:#fff;font-size:11px;text-shadow:1px 1px 3px #000;}
#minimap{position:absolute;bottom:80px;right:15px;width:60px;height:200px;background:rgba(0,0,0,0.4);border-radius:8px;border:1px solid rgba(255,255,255,0.2);overflow:hidden;}
#minimapCanvas{width:100%;height:100%;}
#penaltyText{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ff3333;font-size:36px;font-weight:bold;text-shadow:2px 2px 8px rgba(0,0,0,0.8);opacity:0;transition:opacity .2s;pointer-events:none;}
#driftText{position:absolute;top:60%;left:50%;transform:translate(-50%,-50%);color:#ff9900;font-size:28px;font-weight:bold;text-shadow:2px 2px 8px rgba(0,0,0,0.8);opacity:0;pointer-events:none;}

/* Start Screen */
#startScreen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a0033 0%,#330066 40%,#660066 70%,#ff6699 100%);}
#startScreen h1{font-size:72px;font-weight:900;font-style:italic;background:linear-gradient(135deg,#ff69b4,#9b59b6,#ff69b4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;filter:drop-shadow(3px 3px 6px rgba(0,0,0,0.5));margin-bottom:10px;letter-spacing:-2px;}
#startScreen .subtitle{color:rgba(255,255,255,0.7);font-size:16px;margin-bottom:40px;letter-spacing:4px;text-transform:uppercase;}
#startBtn{padding:18px 50px;font-size:24px;font-weight:bold;color:#fff;background:linear-gradient(135deg,#ff69b4,#9b59b6);border:none;border-radius:50px;cursor:pointer;pointer-events:all;animation:pulse 1.5s ease-in-out infinite;box-shadow:0 0 30px rgba(255,105,180,0.5);letter-spacing:2px;}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 30px rgba(255,105,180,0.5);}50%{transform:scale(1.05);box-shadow:0 0 50px rgba(255,105,180,0.8);}}

/* Countdown */
#countdown{position:fixed;top:0;left:0;width:100%;height:100%;z-index:90;display:none;align-items:center;justify-content:center;pointer-events:none;}
#countdownText{font-size:120px;font-weight:900;color:#fff;text-shadow:0 0 40px rgba(255,105,180,0.8),0 0 80px rgba(155,89,182,0.5);animation:countPop .4s ease-out;}
@keyframes countPop{0%{transform:scale(2);opacity:0;}100%{transform:scale(1);opacity:1;}}

/* Finish Screen */
#finishScreen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);}
#finishScreen h2{font-size:48px;color:#ffd700;margin-bottom:10px;text-shadow:2px 2px 10px rgba(0,0,0,0.8);}
#finishScreen .finishMsg{font-size:28px;color:#ff69b4;margin-bottom:20px;font-weight:bold;}
#finishScreen .timeInfo{color:#fff;font-size:22px;margin:5px 0;}
#restartBtn{margin-top:30px;padding:16px 40px;font-size:22px;font-weight:bold;color:#fff;background:linear-gradient(135deg,#ff69b4,#9b59b6);border:none;border-radius:50px;cursor:pointer;pointer-events:all;box-shadow:0 0 20px rgba(255,105,180,0.5);}

/* Touch Controls */
#touchControls{position:fixed;bottom:0;left:0;width:100%;height:220px;z-index:50;display:none;pointer-events:none;}
#joystickArea{position:absolute;bottom:30px;left:25px;width:160px;height:160px;pointer-events:all;}
#joystickBase{width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.12);border:3px solid rgba(255,255,255,0.25);position:relative;}
#joystickThumb{width:65px;height:65px;border-radius:50%;background:rgba(255,255,255,0.35);border:2px solid rgba(255,255,255,0.4);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;transition:transform 0.05s;}
#gasBtn,#brakeBtn{position:absolute;bottom:40px;border-radius:50%;font-size:18px;font-weight:bold;color:#fff;border:3px solid rgba(255,255,255,0.3);pointer-events:all;display:flex;align-items:center;justify-content:center;transition:transform 0.1s,background 0.1s;}
#gasBtn{right:25px;width:100px;height:100px;background:rgba(0,200,80,0.35);}
#brakeBtn{right:140px;width:80px;height:80px;background:rgba(220,40,40,0.35);}
#gasBtn.pressed{transform:scale(0.9);background:rgba(0,200,80,0.6);}
#brakeBtn.pressed{transform:scale(0.9);background:rgba(220,40,40,0.6);}

/* Confetti */
.confetti{position:fixed;width:10px;height:10px;z-index:95;pointer-events:none;animation:confettiFall 3s ease-out forwards;}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg);}100%{opacity:0;transform:translateY(100vh) rotate(720deg);}}
</style>
</head>
<body>
<div id="dbg" style="position:fixed;top:0;left:0;z-index:9999;background:rgba(0,0,0,0.8);color:lime;font-size:13px;padding:8px;pointer-events:none;max-width:100vw;word-break:break-all;"></div>

<div id="speedLines"></div>
<div id="vignette"></div>

<div id="hud" style="display:none;">
  <div id="timer">0:00.000</div>
  <div id="bestTime"></div>
  <div id="speedometer"><canvas id="speedCanvas" width="200" height="110"></canvas></div>
  <div id="progressLabel">DISTANCE</div>
  <div id="progressBar"><div id="progressFill"></div></div>
  <div id="minimap"><canvas id="minimapCanvas" width="60" height="200"></canvas></div>
  <div id="penaltyText">-2s PENALTY!</div>
  <div id="driftText">DRIFT!</div>
</div>

<div id="startScreen">
  <h1>SuperAsia</h1>
  <div class="subtitle">Highway Racing</div>
  <button id="startBtn">TAP TO RACE</button>
</div>

<div id="countdown"><div id="countdownText"></div></div>

<div id="finishScreen">
  <h2>&#127937; FINISH!</h2>
  <div class="finishMsg">Asia arriva!</div>
  <div class="timeInfo" id="finalTime"></div>
  <div class="timeInfo" id="finalBest"></div>
  <button id="restartBtn">Race Again</button>
</div>

<div id="touchControls">
  <div id="joystickArea">
    <div id="joystickBase"><div id="joystickThumb"></div></div>
  </div>
  <div id="gasBtn">GAS</div>
  <div id="brakeBtn">BRAKE</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script>
(function(){

function dbg(msg) {
  const el = document.getElementById('dbg');
  if (el) el.innerHTML += msg + '<br>';
  console.log('[DBG] ' + msg);
}

// ==================== PLATFORM DETECTION ====================
const isMobile = window.innerWidth < 1024 || ('ontouchstart' in window);
dbg('isMobile=' + isMobile + ' width=' + window.innerWidth + ' touch=' + ('ontouchstart' in window));

// ==================== GLOBALS ====================
const ROAD_LENGTH = 3000;
const ROAD_WIDTH = 36;
const LANE_COUNT = 6;
const LANE_WIDTH = ROAD_WIDTH / LANE_COUNT;
const FINISH_Z = -ROAD_LENGTH;
const MAX_SPEED = 5.0;
const ACCEL = 0.045;
const BRAKE_FORCE = 0.06;
const FRICTION = 0.005;
const COAST_DECEL = 0.012;
const STEER_SPEED = 0.07;
const STEER_RETURN = 0.04;
const COLLISION_RADIUS = 2.2;
const PENALTY_TIME = 2000;
const AI_COUNT = isMobile ? 6 : 12;
const CURVE_AMP1 = 20;
const CURVE_AMP2 = 35;
const DRIFT_STEER_THRESHOLD = 0.8;
const DRIFT_SPEED_THRESHOLD = 3.0;
const AI_CULL_DIST = 300;
const BOOST_DURATION = 2000;

let scene, camera, renderer;
let clock = new THREE.Clock();
let playerGroup;
let aiCars = [];
let gameState = 'start';
let raceTime = 0;
let bestTime = localStorage.getItem('superasia_best') ? parseFloat(localStorage.getItem('superasia_best')) : null;
let penaltyTotal = 0;
let speed = 0;
let steering = 0;
let playerZ = 0;
let playerX = 0;
let collisionCooldown = 0;
let hairSegments = [];
let keys = {};
let touchGas = false;
let touchBrake = false;
let joystickX = 0;
let cameraShake = 0;
let gameStarted = false;
let isDrifting = false;
let driftTimer = 0;
let boostTimer = 0;
let raceStartTime = 0;

// Player kart parts (avoid assigning custom props to THREE.Group on Safari)
let playerWheels = [];
let playerFlames = [];

// Particle pools
let exhaustParticles = [];
let driftSmokeParticles = [];
let tireMarks = [];
let tireMarkIndex = 0;

// ==================== ROAD CURVE ====================
function getRoadX(z) {
  return Math.sin(z * 0.002) * CURVE_AMP1 + Math.sin(z * 0.0007) * CURVE_AMP2;
}
function getRoadDerivX(z) {
  return Math.cos(z * 0.002) * CURVE_AMP1 * 0.002 + Math.cos(z * 0.0007) * CURVE_AMP2 * 0.0007;
}

// ==================== MATERIAL HELPERS ====================
function roadMat(color, opts) {
  if (isMobile) return new THREE.MeshLambertMaterial(Object.assign({ color }, opts || {}));
  return new THREE.MeshStandardMaterial(Object.assign({ color }, opts || {}));
}

// ==================== INIT SCENE ====================
function initScene() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x1a0a2e, isMobile ? 0.0005 : 0.0008);

  renderer = new THREE.WebGLRenderer({
    antialias: !isMobile,
    alpha: false,
    powerPreference: 'high-performance'
  });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(isMobile ? 1 : Math.min(window.devicePixelRatio, 2));

  if (isMobile) {
    renderer.shadowMap.enabled = false;
  } else {
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  }

  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.domElement.id = 'gameCanvas';
  renderer.domElement.style.touchAction = 'none';
  renderer.domElement.style.position = 'fixed';
  renderer.domElement.style.top = '0';
  renderer.domElement.style.left = '0';
  renderer.domElement.style.zIndex = '1';
  document.body.insertBefore(renderer.domElement, document.body.firstChild);

  camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.5, 2000);
  camera.position.set(0, 2, 10);

  const ambient = new THREE.AmbientLight(0x334466, isMobile ? 0.9 : 0.6);
  scene.add(ambient);

  const hemi = new THREE.HemisphereLight(0xff8844, 0x223366, isMobile ? 0.6 : 0.4);
  scene.add(hemi);

  const sun = new THREE.DirectionalLight(0xffaa55, isMobile ? 1.0 : 0.8);
  sun.position.set(-100, 80, -200);
  if (!isMobile) {
    sun.castShadow = true;
    sun.shadow.mapSize.width = 512;
    sun.shadow.mapSize.height = 512;
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 600;
    sun.shadow.camera.left = -60;
    sun.shadow.camera.right = 60;
    sun.shadow.camera.top = 60;
    sun.shadow.camera.bottom = -60;
  }
  scene.add(sun);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

// ==================== SKY ====================
function createSky() {
  const skyGeo = new THREE.SphereGeometry(900, 32, 32);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {},
    vertexShader: `varying vec3 vWorldPos;void main(){vec4 wp=modelMatrix*vec4(position,1.0);vWorldPos=wp.xyz;gl_Position=projectionMatrix*viewMatrix*wp;}`,
    fragmentShader: `varying vec3 vWorldPos;void main(){float h=normalize(vWorldPos).y;vec3 bottom=vec3(0.95,0.4,0.15);vec3 mid=vec3(0.85,0.25,0.45);vec3 top=vec3(0.08,0.03,0.18);vec3 col;if(h<0.0)col=bottom;else if(h<0.3)col=mix(bottom,mid,h/0.3);else col=mix(mid,top,(h-0.3)/0.7);gl_FragColor=vec4(col,1.0);}`
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));

  const cSegs = isMobile ? [5, 4] : [8, 6];
  const cloudMat = new THREE.MeshBasicMaterial({ color: 0xff9966, transparent: true, opacity: 0.2 });
  for (let i = 0; i < 30; i++) {
    const s = 30 + Math.random() * 60;
    const cloud = new THREE.Mesh(new THREE.SphereGeometry(s, cSegs[0], cSegs[1]), cloudMat);
    cloud.scale.y = 0.3;
    cloud.position.set((Math.random() - 0.5) * 1400, 100 + Math.random() * 200, (Math.random() - 0.5) * 1400);
    scene.add(cloud);
  }
}

// ==================== MERGED HIGHWAY BUILDER ====================
function createHighway() {
  const segLen = 20;
  const numSegs = Math.ceil(ROAD_LENGTH / segLen) + 2;
  const hw = ROAD_WIDTH / 2;

  // Collect vertices for merged geometries
  const roadVerts = [];
  const laneWhiteVerts = [];
  const laneYellowVerts = [];
  const barrierVerts = [];
  const catEyeVerts = [];
  let pointLightCount = 0;
  const MAX_POINT_LIGHTS = isMobile ? 0 : 4;

  for (let i = 0; i < numSegs; i++) {
    const z0 = -i * segLen;
    const z1 = -(i + 1) * segLen;
    const x0 = getRoadX(z0);
    const x1 = getRoadX(z1);

    // Road quad
    roadVerts.push(
      x0 - hw, 0, z0,  x0 + hw, 0, z0,  x1 + hw, 0, z1,
      x0 - hw, 0, z0,  x1 + hw, 0, z1,  x1 - hw, 0, z1
    );

    // Lane markings (dashed)
    if (i % 2 === 0) {
      for (let lane = 1; lane < LANE_COUNT; lane++) {
        const lx0 = x0 - hw + lane * LANE_WIDTH;
        const lx1 = x1 - hw + lane * LANE_WIDTH;
        const isCenter = (lane === 3);
        const lineW = isCenter ? 0.15 : 0.08;
        const target = isCenter ? laneYellowVerts : laneWhiteVerts;
        const dashEnd = z1 + segLen * 0.4;
        target.push(
          lx0 - lineW, 0.01, z0,  lx0 + lineW, 0.01, z0,  lx1 + lineW, 0.01, dashEnd,
          lx0 - lineW, 0.01, z0,  lx1 + lineW, 0.01, dashEnd,  lx1 - lineW, 0.01, dashEnd
        );
      }
    }

    // Cat-eyes — skip on mobile
    if (!isMobile && i % 3 === 0) {
      for (let lane = 0; lane <= LANE_COUNT; lane++) {
        const cx = x0 - hw + lane * LANE_WIDTH;
        const s = 0.1;
        const y = 0.04;
        catEyeVerts.push(
          cx - s, y, z0 - s,  cx + s, y, z0 - s,  cx + s, y, z0 + s,
          cx - s, y, z0 - s,  cx + s, y, z0 + s,  cx - s, y, z0 + s
        );
      }
    }

    // Barriers — merged quads
    for (let side = -1; side <= 1; side += 2) {
      const bx = (side === -1) ? x0 - hw - 1.5 : x0 + hw + 1.5;
      const bx2 = (side === -1) ? x1 - hw - 1.5 : x1 + hw + 1.5;
      const bw = 0.15;
      const bh = 0.8;
      // Front face
      barrierVerts.push(
        bx - bw, 0, z0,  bx + bw, 0, z0,  bx + bw, bh, z0,
        bx - bw, 0, z0,  bx + bw, bh, z0,  bx - bw, bh, z0
      );
      // Top face
      barrierVerts.push(
        bx - bw, bh, z0,  bx + bw, bh, z0,  bx2 + bw, bh, z1,
        bx - bw, bh, z0,  bx2 + bw, bh, z1,  bx2 - bw, bh, z1
      );
      // Outer face
      const ox = (side === -1) ? -bw : bw;
      barrierVerts.push(
        bx + ox, 0, z0,  bx2 + ox, 0, z1,  bx2 + ox, bh, z1,
        bx + ox, 0, z0,  bx2 + ox, bh, z1,  bx + ox, bh, z0
      );
    }

    // Light poles (individual meshes — kept sparse)
    if (i % 5 === 0 && i > 0) {
      for (let side = -1; side <= 1; side += 2) {
        const px = (side === -1) ? x0 - hw - 3 : x0 + hw + 3;

        const poleMat = roadMat(0x666666, { metalness: 0.6 });
        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 10, 6), poleMat);
        pole.position.set(px, 5, z0);
        if (!isMobile) pole.castShadow = true;
        scene.add(pole);

        const arm = new THREE.Mesh(new THREE.BoxGeometry(3, 0.12, 0.12), poleMat);
        arm.position.set(px + 1.5 * -side, 10, z0);
        scene.add(arm);

        const fixtureMat = new THREE.MeshBasicMaterial({ color: 0xffaa44 });
        const fixture = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.15, 0.6), fixtureMat);
        fixture.position.set(px + 2.5 * -side, 9.9, z0);
        scene.add(fixture);

        if (!isMobile && pointLightCount < MAX_POINT_LIGHTS) {
          const light = new THREE.PointLight(0xff9944, 1.5, 60, 2);
          light.position.set(px + 2.5 * -side, 9.5, z0);
          scene.add(light);
          pointLightCount++;
        }
      }
    }

    // Road signs
    if (i % 15 === 0 && i > 0) {
      const signSide = (i % 30 === 0) ? -1 : 1;
      const sx = getRoadX(z0) + signSide * (hw + 4);
      const signGroup = new THREE.Group();
      signGroup.add(new THREE.Mesh(new THREE.BoxGeometry(8, 3, 0.2), roadMat(0x006633)));
      signGroup.children[0].position.y = 8;
      const textArea = new THREE.Mesh(new THREE.BoxGeometry(7, 1, 0.25), new THREE.MeshBasicMaterial({ color: 0xffffff }));
      textArea.position.y = 8;
      signGroup.add(textArea);
      for (let sp = -1; sp <= 1; sp += 2) {
        const spost = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 8, 6), roadMat(0x555555));
        spost.position.set(sp * 3, 4, 0);
        signGroup.add(spost);
      }
      signGroup.position.set(sx, 0, z0);
      scene.add(signGroup);
    }

    // Overpasses
    if (i === 25 || i === 60 || i === 100) {
      const oz = z0, ox = getRoadX(oz);
      const bridge = new THREE.Mesh(new THREE.BoxGeometry(ROAD_WIDTH + 20, 1.5, 6), roadMat(0x555555, { roughness: 0.8 }));
      bridge.position.set(ox, 8, oz);
      if (!isMobile) bridge.castShadow = true;
      scene.add(bridge);
      for (let ps = -1; ps <= 1; ps += 2) {
        const pillar = new THREE.Mesh(new THREE.BoxGeometry(1.5, 8, 1.5), roadMat(0x444444));
        pillar.position.set(ox + ps * (hw + 2), 4, oz);
        scene.add(pillar);
      }
    }
  }

  // === BUILD MERGED MESHES ===
  function buildMerged(verts, mat) {
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(verts), 3));
    geo.computeVertexNormals();
    const mesh = new THREE.Mesh(geo, mat);
    mesh.receiveShadow = !isMobile;
    scene.add(mesh);
    return mesh;
  }

  buildMerged(roadVerts, roadMat(0x222222, { roughness: 0.7, metalness: 0.1 }));
  buildMerged(laneWhiteVerts, new THREE.MeshBasicMaterial({ color: 0xffffff }));
  buildMerged(laneYellowVerts, new THREE.MeshBasicMaterial({ color: 0xffcc00 }));
  buildMerged(barrierVerts, roadMat(0xaaaaaa, { metalness: 0.7, roughness: 0.3 }));

  if (!isMobile && catEyeVerts.length > 0) {
    buildMerged(catEyeVerts, new THREE.MeshBasicMaterial({ color: 0xffff88 }));
  }

  // Finish line
  const finishCanvas = document.createElement('canvas');
  finishCanvas.width = 256; finishCanvas.height = 64;
  const fctx = finishCanvas.getContext('2d');
  for (let fy = 0; fy < 64; fy += 16) {
    for (let fx = 0; fx < 256; fx += 16) {
      fctx.fillStyle = ((fx / 16 + fy / 16) % 2 === 0) ? '#fff' : '#000';
      fctx.fillRect(fx, fy, 16, 16);
    }
  }
  const finishTex = new THREE.CanvasTexture(finishCanvas);
  const finishLine = new THREE.Mesh(
    new THREE.PlaneGeometry(ROAD_WIDTH, 4),
    new THREE.MeshBasicMaterial({ map: finishTex, side: THREE.DoubleSide })
  );
  finishLine.rotation.x = -Math.PI / 2;
  finishLine.position.set(getRoadX(FINISH_Z), 0.05, FINISH_Z);
  scene.add(finishLine);

  const banner = new THREE.Mesh(
    new THREE.PlaneGeometry(ROAD_WIDTH, 3),
    new THREE.MeshBasicMaterial({ color: 0xff69b4, side: THREE.DoubleSide, transparent: true, opacity: 0.8 })
  );
  banner.position.set(getRoadX(FINISH_Z), 6, FINISH_Z);
  scene.add(banner);

  // Ground
  const groundMat2 = roadMat(0x1a3300, { roughness: 1 });
  for (let gi = 0; gi < 6; gi++) {
    const gz = -gi * 500, gx = getRoadX(gz);
    for (let side = -1; side <= 1; side += 2) {
      const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 600), groundMat2);
      ground.rotation.x = -Math.PI / 2;
      ground.position.set(gx + side * 120, -0.1, gz - 250);
      scene.add(ground);
    }
  }

  // City silhouette
  const cityMat = new THREE.MeshBasicMaterial({ color: 0x110022 });
  const wMat = new THREE.MeshBasicMaterial({ color: 0xffcc66, transparent: true, opacity: 0.6 });
  for (let ci = 0; ci < 40; ci++) {
    const bh = 20 + Math.random() * 80;
    const bw = 8 + Math.random() * 15;
    const bd = 8 + Math.random() * 15;
    const building = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), cityMat);
    const angle = (ci / 40) * Math.PI * 2;
    building.position.set(
      Math.cos(angle) * (400 + Math.random() * 100), bh / 2,
      Math.sin(angle) * (400 + Math.random() * 100) - 1500
    );
    scene.add(building);

    if (!isMobile && Math.random() > 0.3) {
      for (let wy = 0; wy < bh - 5; wy += 6) {
        for (let wx = -bw / 2 + 2; wx < bw / 2 - 2; wx += 4) {
          if (Math.random() > 0.4) {
            const win = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 2), wMat);
            win.position.set(
              building.position.x + (Math.random() > 0.5 ? bw / 2 + 0.1 : -bw / 2 - 0.1),
              wy + 3, building.position.z + wx
            );
            win.rotation.y = Math.random() > 0.5 ? 0 : Math.PI / 2;
            scene.add(win);
          }
        }
      }
    }
  }
}

// ==================== EXHAUST PARTICLES ====================
function createExhaustParticles() {
  const mat = new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.7 });
  for (let i = 0; i < 20; i++) {
    const p = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.08), mat.clone());
    p.visible = false;
    p.userData = { life: 0, vx: 0, vy: 0, vz: 0 };
    scene.add(p);
    exhaustParticles.push(p);
  }
}

function emitExhaustParticle() {
  for (let i = 0; i < exhaustParticles.length; i++) {
    const p = exhaustParticles[i];
    if (!p.visible) {
      const side = (Math.random() > 0.5) ? 0.5 : -0.5;
      p.position.copy(playerGroup.position);
      p.position.x += side + (Math.random() - 0.5) * 0.2;
      p.position.y += 0.35;
      p.position.z += 1.9;
      p.userData.life = 1.0;
      p.userData.vy = 0.5 + Math.random() * 0.5;
      p.userData.vz = 1.0 + Math.random() * 1.0;
      p.userData.vx = (Math.random() - 0.5) * 0.3;
      p.visible = true;
      p.material.opacity = 0.7;
      const s = 0.06 + Math.random() * 0.06;
      p.scale.set(s / 0.08, s / 0.08, s / 0.08);
      return;
    }
  }
}

function updateExhaustParticles(dt) {
  exhaustParticles.forEach(p => {
    if (!p.visible) return;
    p.userData.life -= dt * 2.5;
    if (p.userData.life <= 0) { p.visible = false; return; }
    p.position.x += p.userData.vx * dt;
    p.position.y += p.userData.vy * dt;
    p.position.z += p.userData.vz * dt;
    p.material.opacity = p.userData.life * 0.7;
    const s = 1 + (1 - p.userData.life) * 2;
    p.scale.set(s, s, s);
  });
}

  );
  cabin.position.set(0, 1.1, -0.2);

  const wMat = roadMat(0x222222, { roughness: 0.8 });
  [[-0.95, 0.25, -0.9],[0.95, 0.25, -0.9],[-0.95, 0.25, 0.8],[0.95, 0.25, 0.8]].forEach(p => {

    headlight.position.set(hl * 0.6, 0.6, -1.42);

function spawnAICars() {
  const colors = [0xff3333, 0x3366ff, 0xffcc00, 0x33cc33, 0xff6600, 0x9933ff, 0x00cccc, 0xff3399, 0x66ff33, 0xcc6600, 0x3399ff, 0xff6666];

  for (let i = 0; i < AI_COUNT; i++) {
    const lane = Math.floor(Math.random() * LANE_COUNT);
    const z = -(100 + Math.random() * (ROAD_LENGTH - 200));
    const roadX = getRoadX(z);
    const laneX = roadX - ROAD_WIDTH / 2 + (lane + 0.5) * LANE_WIDTH;

    const car = createAICar(colors[i % colors.length]);
    car.position.set(laneX, 0, z);
    scene.add(car);

    // More varied speeds: some very slow, some very fast
    let spd;
    const roll = Math.random();
    if (roll < 0.2) spd = 0.3 + Math.random() * 0.5;       // slow
    else if (roll < 0.6) spd = 1.0 + Math.random() * 1.5;   // medium
    else if (roll < 0.85) spd = 2.5 + Math.random() * 1.5;  // fast
    else spd = 4.0 + Math.random() * 1.0;                    // very fast (overtakers)

    aiCars.push({
      mesh: car,
      speed: spd,
      lane, targetLane: lane,
      laneChangeTimer: Math.random() * 300,
      z,
      passed: false
    });
  }
}

// ==================== HUD ====================
function drawSpeedometer(spd) {
  const canvas = document.getElementById('speedCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 200, 110);

  const cx = 100, cy = 100, r = 80;
  const startAngle = Math.PI * 0.8;
  const totalAngle = (2 * Math.PI) - (startAngle - Math.PI * 0.2);
  const spdRatio = Math.min(spd / MAX_SPEED, 1);
  const currentAngle = startAngle + totalAngle * spdRatio;

  ctx.beginPath();
  ctx.arc(cx, cy, r, startAngle, startAngle + totalAngle);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 8;
  ctx.stroke();

  const grad = ctx.createLinearGradient(0, 0, 200, 0);
  grad.addColorStop(0, '#33ff88');
  grad.addColorStop(0.5, '#ffcc00');
  grad.addColorStop(1, '#ff3333');
  ctx.beginPath();
  ctx.arc(cx, cy, r, startAngle, currentAngle);
  ctx.strokeStyle = grad;
  ctx.lineWidth = 8;
  ctx.stroke();

  for (let t = 0; t <= 10; t++) {
    const a = startAngle + (totalAngle * t / 10);
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * (r - 12), cy + Math.sin(a) * (r - 12));
    ctx.lineTo(cx + Math.cos(a) * (r - 4), cy + Math.sin(a) * (r - 4));
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(currentAngle) * (r - 20), cy + Math.sin(currentAngle) * (r - 20));
  ctx.strokeStyle = '#ff69b4';
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#ff69b4';
  ctx.fill();

  const kmh = Math.round(spdRatio * 180);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px Segoe UI';
  ctx.textAlign = 'center';
  ctx.fillText(kmh, cx, cy - 15);
  ctx.font = '10px Segoe UI';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText('km/h', cx, cy - 2);
}

function drawMinimap() {
  const canvas = document.getElementById('minimapCanvas');
  const ctx = canvas.getContext('2d');
  const w = 60, h = 200;
  ctx.clearRect(0, 0, w, h);

  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 8;
  ctx.beginPath();
  for (let i = 0; i <= 100; i++) {
    const z = -(i / 100) * ROAD_LENGTH;
    const rx = getRoadX(z);
    const mx = w / 2 + rx * 0.05;
    const my = h - (i / 100) * h;
    if (i === 0) ctx.moveTo(mx, my); else ctx.lineTo(mx, my);
  }
  ctx.stroke();

  const pProgress = Math.min(Math.abs(playerZ) / ROAD_LENGTH, 1);
  const prx = getRoadX(playerZ);
  ctx.beginPath();
  ctx.arc(w / 2 + prx * 0.05, h - pProgress * h, 3, 0, Math.PI * 2);
  ctx.fillStyle = '#ff69b4';
  ctx.fill();

  aiCars.forEach(ai => {
    const ap = Math.min(Math.abs(ai.z) / ROAD_LENGTH, 1);
    ctx.beginPath();
    ctx.arc(w / 2 + getRoadX(ai.z) * 0.05, h - ap * h, 2, 0, Math.PI * 2);
    ctx.fillStyle = '#ff3333';
    ctx.fill();
  });

  ctx.fillStyle = '#ffd700';
  ctx.fillRect(w / 2 - 10, 1, 20, 2);
}

function formatTime(ms) {
  const min = Math.floor(ms / 60000);
  const sec = Math.floor((ms % 60000) / 1000);
  const millis = Math.floor(ms % 1000);
  return min + ':' + String(sec).padStart(2, '0') + '.' + String(millis).padStart(3, '0');
}

// ==================== CONTROLS ====================
function setupControls() {
  document.addEventListener('keydown', e => { keys[e.code] = true; });
  document.addEventListener('keyup', e => { keys[e.code] = false; });

  if (isMobile) {
    document.getElementById('touchControls').style.display = 'block';

    const gasBtn = document.getElementById('gasBtn');
    const brakeBtn = document.getElementById('brakeBtn');

    gasBtn.addEventListener('touchstart', e => { e.preventDefault(); touchGas = true; gasBtn.classList.add('pressed'); });
    gasBtn.addEventListener('touchend', e => { e.preventDefault(); touchGas = false; gasBtn.classList.remove('pressed'); });
    gasBtn.addEventListener('touchcancel', () => { touchGas = false; gasBtn.classList.remove('pressed'); });

    brakeBtn.addEventListener('touchstart', e => { e.preventDefault(); touchBrake = true; brakeBtn.classList.add('pressed'); });
    brakeBtn.addEventListener('touchend', e => { e.preventDefault(); touchBrake = false; brakeBtn.classList.remove('pressed'); });
    brakeBtn.addEventListener('touchcancel', () => { touchBrake = false; brakeBtn.classList.remove('pressed'); });

    const jArea = document.getElementById('joystickArea');
    const jThumb = document.getElementById('joystickThumb');
    let jActive = false, jTouchId = null;
    let jCenterX = 0;

    jArea.addEventListener('touchstart', e => {
      e.preventDefault();
      const t = e.changedTouches[0];
      jTouchId = t.identifier;
      jActive = true;
      const rect = jArea.getBoundingClientRect();
      jCenterX = rect.left + rect.width / 2;
    });

    document.addEventListener('touchmove', e => {
      if (!jActive) return;
      const t = Array.from(e.touches).find(tt => tt.identifier === jTouchId);
      if (!t) return;
      const dx = t.clientX - jCenterX;
      const maxD = 65;
      const clamped = Math.max(-maxD, Math.min(maxD, dx));
      joystickX = clamped / maxD;
      jThumb.style.transform = `translate(calc(-50% + ${clamped}px), -50%)`;
    });

    const endJoystick = e => {
      const found = Array.from(e.touches).find(tt => tt.identifier === jTouchId);
      if (!found) {
        jActive = false;
        jTouchId = null;
        joystickX = 0;
        jThumb.style.transform = 'translate(-50%, -50%)';
      }
    };
    document.addEventListener('touchend', endJoystick);
    document.addEventListener('touchcancel', endJoystick);
  }
}

// ==================== CONFETTI ====================
function spawnConfetti() {
  const colors = ['#ff69b4','#ffd700','#ff6347','#00ff88','#6666ff','#ff66cc','#ffcc00','#00ccff'];
  for (let i = 0; i < 80; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.top = -10 + 'px';
    c.style.width = (6 + Math.random() * 10) + 'px';
    c.style.height = (6 + Math.random() * 10) + 'px';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    c.style.animationDelay = (Math.random() * 1.5) + 's';
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

// ==================== GAME STATES ====================
function startGame() {
  try {
    dbg('startGame called, gameStarted=' + gameStarted + ', gameState=' + gameState);
    if (gameStarted) { dbg('BLOCKED by gameStarted guard'); return; }
    gameStarted = true;
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('countdown').style.display = 'flex';
    document.getElementById('hud').style.display = 'block';
    gameState = 'countdown';
    speed = 0; playerZ = 0; playerX = 0; steering = 0;
    raceTime = 0; penaltyTotal = 0; collisionCooldown = 0;
    isDrifting = false; driftTimer = 0; boostTimer = 0;
    playerGroup.position.set(getRoadX(0), 0, 0);
    playerGroup.rotation.set(0, 0, 0);

    tireMarks.forEach(m => m.visible = false);
    tireMarkIndex = 0;

    aiCars.forEach(ai => {
      const lane = Math.floor(Math.random() * LANE_COUNT);
      const z = -(100 + Math.random() * (ROAD_LENGTH - 200));
      ai.lane = lane; ai.targetLane = lane; ai.z = z;
      ai.passed = false;
      ai.mesh.position.set(
        getRoadX(z) - ROAD_WIDTH / 2 + (lane + 0.5) * LANE_WIDTH,
        0, z
      );
      ai.laneChangeTimer = Math.random() * 300;
    });

    dbg('startGame setup done, calling doCountdown');
    doCountdown();
  } catch(e) {
    dbg('startGame ERROR: ' + e.message);
  }
}

function triggerCountAnim(el, text, color) {
  el.textContent = text;
  if (color) el.style.color = color;
  const clone = el.cloneNode(true);
  el.parentNode.replaceChild(clone, el);
  return clone;
}

function doCountdown() {
  dbg('countdown started');
  let cdEl = document.getElementById('countdownText');
  let count = 3;
  cdEl = triggerCountAnim(cdEl, count.toString(), '#fff');

  const interval = setInterval(() => {
    count--;
    dbg('countdown tick: ' + count);
    if (count > 0) {
      cdEl = triggerCountAnim(cdEl, count.toString(), '#fff');
    } else if (count === 0) {
      cdEl = triggerCountAnim(cdEl, 'GO!', '#ff69b4');
    } else {
      clearInterval(interval);
      document.getElementById('countdown').style.display = 'none';
      cdEl.style.color = '#fff';
      gameState = 'racing';
      raceStartTime = Date.now();
      boostTimer = BOOST_DURATION;
      dbg('RACING!');
    }
  }, 1000);
}

function finishRace() {
  gameState = 'finish';
  const finalTime = raceTime + penaltyTotal;
  if (!bestTime || finalTime < bestTime) {
    bestTime = finalTime;
    localStorage.setItem('superasia_best', bestTime.toString());
  }
  document.getElementById('finalTime').textContent = 'Your Time: ' + formatTime(finalTime);
  document.getElementById('finalBest').textContent = 'Best Time: ' + formatTime(bestTime);
  document.getElementById('finishScreen').style.display = 'flex';
  renderer.domElement.style.filter = '';
  spawnConfetti();
}

function restartGame() {
  dbg('restartGame called');
  gameStarted = false;
  document.getElementById('finishScreen').style.display = 'none';
  startGame();
}

// ==================== GAME LOOP ====================
let exhaustEmitTimer = 0;
let driftMarkTimer = 0;

function update(dt) {
  if (gameState !== 'racing') {
    if (gameState === 'start' && playerGroup) {
      playerGroup.rotation.y += dt * 0.3;
      playerGroup.position.y = 0.1 + Math.sin(Date.now() * 0.002) * 0.1;
    }
    return;
  }

  raceTime += dt * 1000;
  if (collisionCooldown > 0) collisionCooldown -= dt * 1000;
  if (boostTimer > 0) boostTimer -= dt * 1000;

  // === INPUT ===
  let accelInput = 0;
  let steerInput = 0;

  if (keys['ArrowUp'] || keys['KeyW']) accelInput = 1;
  if (keys['ArrowDown'] || keys['KeyS']) accelInput = -1;
  if (keys['ArrowLeft'] || keys['KeyA']) steerInput = -1;
  if (keys['ArrowRight'] || keys['KeyD']) steerInput = 1;

  if (isMobile) {
    if (touchGas) accelInput = 1;
    if (touchBrake) accelInput = -1;
    steerInput = joystickX;
  }

  // === START BOOST ===
  if (boostTimer > 0) {
    const boostTarget = MAX_SPEED * 0.6;
    if (speed < boostTarget) speed += ACCEL * 1.5;
  }

  // === SPEED ===
  if (accelInput > 0) {
    speed += ACCEL * accelInput;
  } else if (accelInput < 0) {
    speed -= BRAKE_FORCE;
  } else {
    speed -= COAST_DECEL;
  }
  speed -= FRICTION;
  speed = Math.max(0, Math.min(MAX_SPEED, speed));

  // === STEERING ===
  if (Math.abs(steerInput) > 0.1) {
    steering += steerInput * STEER_SPEED;
  } else {
    if (steering > 0) steering = Math.max(0, steering - STEER_RETURN);
    else if (steering < 0) steering = Math.min(0, steering + STEER_RETURN);
  }
  steering = Math.max(-1.5, Math.min(1.5, steering));

  // === DRIFT ===
  const absSteering = Math.abs(steering);
  const wasDrifting = isDrifting;
  isDrifting = absSteering > DRIFT_STEER_THRESHOLD && speed > DRIFT_SPEED_THRESHOLD;

  if (isDrifting) {
    driftTimer += dt;
    const driftSlide = Math.sign(steering) * speed * 0.04;
    playerX += driftSlide;

    driftMarkTimer += dt;
    if (driftMarkTimer > 0.05) {
      driftMarkTimer = 0;
      placeTireMark();
      emitDriftSmoke();
      emitDriftSmoke();
    }

    if (!wasDrifting) {
      document.getElementById('driftText').style.opacity = '1';
    }
  } else {
    if (wasDrifting) {
      document.getElementById('driftText').style.opacity = '0';
    }
    driftTimer = 0;
  }

  // === MOVE PLAYER ===
  const roadXAtPlayer = getRoadX(playerZ);

  playerZ -= speed;
  playerX += steering * 0.15;

  const halfRoad = ROAD_WIDTH / 2 - 1.5;
  playerX = Math.max(-halfRoad, Math.min(halfRoad, playerX));

  // Road bump simulation
  const roadBump = Math.sin(playerZ * 0.5) * 0.04 + Math.sin(playerZ * 1.3) * 0.02;

  playerGroup.position.x = roadXAtPlayer + playerX;
  playerGroup.position.z = playerZ;
  playerGroup.position.y = roadBump;

  // Exaggerated rotation when drifting
  const driftRotMul = isDrifting ? 2.5 : 1.0;
  playerGroup.rotation.y = -steering * 0.15 * driftRotMul;
  playerGroup.rotation.z = -steering * 0.05 * driftRotMul;

  // Wheel spin
  if (playerWheels.length) {
    playerWheels.forEach(w => { w.rotation.x += speed * 0.5; });
  }

  // Exhaust flames + particles
  if (playerFlames.length) {
    const showFlame = accelInput > 0 && speed > 0.5;
    playerFlames.forEach(f => {
      f.visible = showFlame;
      if (showFlame) f.scale.set(0.8 + Math.random() * 0.4, 0.8 + Math.random() * 0.4, 0.6 + Math.random() * 0.8);
    });
  }

  exhaustEmitTimer += dt;
  if (speed > 0.5 && exhaustEmitTimer > 0.05) {
    exhaustEmitTimer = 0;
    emitExhaustParticle();
  }
  updateExhaustParticles(dt);
  updateDriftSmoke(dt);
  updateTireMarks(dt);

  // Hair animation
  const speedFactor = speed / MAX_SPEED;
  hairSegments.forEach(strand => {
    strand.forEach((seg, si) => {
      const baseZ = 0.35 + si * 0.2;
      const baseY = 1.5 - si * 0.06;
      const blow = speedFactor * si * 0.07;
      const wave = Math.sin(Date.now() * 0.005 + si * 0.8) * 0.03 * (1 + speedFactor * 3);
      const sway = Math.sin(Date.now() * 0.003 + si * 0.5) * 0.02;
      seg.position.z = baseZ + blow;
      seg.position.y = baseY - blow * 0.3 + wave;
      seg.position.x += sway * 0.05;
      seg.rotation.x = blow * 0.5;
    });
  });

  // === AI CARS ===
  aiCars.forEach(ai => {
    const distToPlayer = Math.abs(ai.z - playerZ);

    // Frustum cull — skip full logic if far away
    if (distToPlayer > AI_CULL_DIST) {
      ai.z += ai.speed * 0.3;
      ai.mesh.position.z = ai.z;
      return;
    }

    ai.z += ai.speed * 0.3;
    if (ai.z > playerZ + 150) {
      ai.z = playerZ - (ROAD_LENGTH * 0.3 + Math.random() * 200);
      ai.lane = Math.floor(Math.random() * LANE_COUNT);
      ai.targetLane = ai.lane;
      ai.passed = false;
    }

    ai.laneChangeTimer -= 1;
    if (ai.laneChangeTimer <= 0) {
      ai.targetLane = Math.max(0, Math.min(LANE_COUNT - 1, ai.lane + Math.floor(Math.random() * 3) - 1));
      ai.laneChangeTimer = 200 + Math.random() * 400;
    }

    if (ai.lane !== ai.targetLane) {
      ai.lane += (ai.targetLane - ai.lane) * 0.01;
      if (Math.abs(ai.lane - ai.targetLane) < 0.05) ai.lane = ai.targetLane;
    }

    const aiRoadX = getRoadX(ai.z);
    const targetX = aiRoadX - ROAD_WIDTH / 2 + (ai.lane + 0.5) * LANE_WIDTH;
    ai.mesh.position.x += (targetX - ai.mesh.position.x) * 0.05;
    ai.mesh.position.z = ai.z;

    // Whoosh effect when overtaking AI at high speed
    if (!ai.passed && ai.z > playerZ && speed > 3.0) {
      if (distToPlayer < 10) {
        ai.passed = true;
        cameraShake = Math.max(cameraShake, 0.15);
      }
    }

    // Collision
    if (collisionCooldown <= 0) {
      const dx = playerGroup.position.x - ai.mesh.position.x;
      const dz = playerGroup.position.z - ai.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      if (dist < COLLISION_RADIUS) {
        speed *= 0.3;
        penaltyTotal += PENALTY_TIME;
        collisionCooldown = 1000;
        cameraShake = 1.5;

        const norm = dx / (dist + 0.01);
        playerX += norm * 2;

        if (isMobile && navigator.vibrate) navigator.vibrate(20);

        document.getElementById('vignette').style.opacity = '1';
        setTimeout(() => { document.getElementById('vignette').style.opacity = '0'; }, 300);

        const penText = document.getElementById('penaltyText');
        penText.style.opacity = '1';
        setTimeout(() => { penText.style.opacity = '0'; }, 800);
      }
    }
  });

  // === CAMERA ===
  const camLerp = 0.04;
  const camTargetX = playerGroup.position.x - steering * 2.5;
  const camTargetZ = playerZ + 6 + speed * 1.5;
  const camTargetY = 1.8 + speed * 0.08;

  camera.position.x += (camTargetX - camera.position.x) * camLerp;
  camera.position.z += (camTargetZ - camera.position.z) * camLerp;
  camera.position.y += (camTargetY - camera.position.y) * camLerp;

  if (cameraShake > 0) {
    camera.position.x += (Math.random() - 0.5) * cameraShake;
    camera.position.y += (Math.random() - 0.5) * cameraShake * 0.5;
    cameraShake *= 0.88;
    if (cameraShake < 0.01) cameraShake = 0;
  }

  // At high speed, look further ahead
  const lookAheadDist = 5 + speedFactor * 8;
  const lookTarget = new THREE.Vector3(
    playerGroup.position.x,
    playerGroup.position.y + 1.2,
    playerGroup.position.z - lookAheadDist
  );
  camera.lookAt(lookTarget);

  // FOV: 65 idle → 95 max
  const targetFov = 65 + speedFactor * 30;
  camera.fov += (targetFov - camera.fov) * 0.05;
  camera.updateProjectionMatrix();

  // Motion blur CSS effect
  const blurAmount = speedFactor > 0.7 ? ((speedFactor - 0.7) * 3.3).toFixed(1) : 0;
  renderer.domElement.style.filter = blurAmount > 0 ? `blur(${blurAmount}px)` : '';

  // Speed lines
  const slOpacity = Math.max(0, speedFactor - 0.3) * 1.5;
  document.getElementById('speedLines').style.opacity = Math.min(slOpacity, 1).toString();

  // === HUD ===
  document.getElementById('timer').textContent = formatTime(raceTime + penaltyTotal);
  if (bestTime) document.getElementById('bestTime').textContent = 'Best: ' + formatTime(bestTime);
  drawSpeedometer(speed);

  const progress = Math.min(Math.abs(playerZ) / ROAD_LENGTH * 100, 100);
  document.getElementById('progressFill').style.width = progress + '%';

  drawMinimap();

  // === FINISH CHECK ===
  if (playerZ <= FINISH_Z) finishRace();
}

// ==================== MAIN LOOP ====================
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  update(dt);
  renderer.render(scene, camera);
}

// ==================== INIT ====================
function init() {
  dbg('init started');
  initScene(); dbg('scene ok');
  createSky(); dbg('sky ok');
  createHighway(); dbg('highway ok');
  createPlayerKart(); dbg('kart ok');
  createExhaustParticles(); dbg('exhaust ok');
  createDriftSmoke(); dbg('smoke ok');
  createTireMarkPool(); dbg('tiremarks ok');
  spawnAICars(); dbg('ai ok');
  createSpeedLines(); dbg('speedlines ok');
  setupControls(); dbg('controls ok');

  if (bestTime) document.getElementById('bestTime').textContent = 'Best: ' + formatTime(bestTime);

  // Bind BOTH click and touchstart on all platforms.
  // gameStarted guard prevents double-fire on mobile where tap triggers both.
  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('startBtn').addEventListener('touchstart', e => { e.preventDefault(); startGame(); });
  document.getElementById('restartBtn').addEventListener('click', restartGame);
  document.getElementById('restartBtn').addEventListener('touchstart', e => { e.preventDefault(); restartGame(); });
  dbg('listeners bound (click+touch on both)');

  animate();
  dbg('animate loop running');
}

try { init(); } catch(e) { dbg('INIT ERROR: ' + e.message + ' @ ' + e.stack); }

})();
</script>
