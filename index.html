<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>SuperAsia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;}
canvas{display:block;}

/* Speed Lines Overlay */
#speedLines{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;opacity:0;transition:opacity .3s;}
#speedLines .line{position:absolute;background:rgba(255,255,255,0.15);filter:blur(2px);}
#speedLines .line.left{left:0;width:3px;}
#speedLines .line.right{right:0;width:3px;}

/* Vignette Flash */
#vignette{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:11;opacity:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(255,0,0,0.6) 100%);transition:opacity .15s;}

/* HUD */
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20;}
#timer{position:absolute;top:20px;left:20px;color:#fff;font-size:28px;font-weight:bold;text-shadow:2px 2px 6px rgba(0,0,0,0.8);}
#bestTime{position:absolute;top:20px;right:20px;color:#ffd700;font-size:20px;font-weight:bold;text-shadow:2px 2px 6px rgba(0,0,0,0.8);}
#speedometer{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);}
#speedCanvas{width:200px;height:110px;}
#progressBar{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:300px;height:12px;background:rgba(0,0,0,0.5);border-radius:6px;border:1px solid rgba(255,255,255,0.3);overflow:hidden;}
#progressFill{height:100%;width:0%;background:linear-gradient(90deg,#ff6ec7,#ffd700);border-radius:6px;transition:width .2s;}
#progressLabel{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);color:#fff;font-size:11px;text-shadow:1px 1px 3px #000;}
#minimap{position:absolute;bottom:80px;right:15px;width:60px;height:200px;background:rgba(0,0,0,0.4);border-radius:8px;border:1px solid rgba(255,255,255,0.2);overflow:hidden;}
#minimapCanvas{width:100%;height:100%;}
#penaltyText{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ff3333;font-size:36px;font-weight:bold;text-shadow:2px 2px 8px rgba(0,0,0,0.8);opacity:0;transition:opacity .2s;pointer-events:none;}

/* Start Screen */
#startScreen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a0033 0%,#330066 40%,#660066 70%,#ff6699 100%);}
#startScreen h1{font-size:72px;font-weight:900;font-style:italic;background:linear-gradient(135deg,#ff69b4,#9b59b6,#ff69b4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;filter:drop-shadow(3px 3px 6px rgba(0,0,0,0.5));margin-bottom:10px;letter-spacing:-2px;}
#startScreen .subtitle{color:rgba(255,255,255,0.7);font-size:16px;margin-bottom:40px;letter-spacing:4px;text-transform:uppercase;}
#startBtn{padding:18px 50px;font-size:24px;font-weight:bold;color:#fff;background:linear-gradient(135deg,#ff69b4,#9b59b6);border:none;border-radius:50px;cursor:pointer;pointer-events:all;animation:pulse 1.5s ease-in-out infinite;box-shadow:0 0 30px rgba(255,105,180,0.5);letter-spacing:2px;}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 30px rgba(255,105,180,0.5);}50%{transform:scale(1.05);box-shadow:0 0 50px rgba(255,105,180,0.8);}}
#previewCanvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:-1;opacity:0.3;}

/* Countdown */
#countdown{position:fixed;top:0;left:0;width:100%;height:100%;z-index:90;display:none;align-items:center;justify-content:center;pointer-events:none;}
#countdownText{font-size:120px;font-weight:900;color:#fff;text-shadow:0 0 40px rgba(255,105,180,0.8),0 0 80px rgba(155,89,182,0.5);animation:countPop .4s ease-out;}
@keyframes countPop{0%{transform:scale(2);opacity:0;}100%{transform:scale(1);opacity:1;}}

/* Finish Screen */
#finishScreen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);}
#finishScreen h2{font-size:48px;color:#ffd700;margin-bottom:10px;text-shadow:2px 2px 10px rgba(0,0,0,0.8);}
#finishScreen .finishMsg{font-size:28px;color:#ff69b4;margin-bottom:20px;font-weight:bold;}
#finishScreen .timeInfo{color:#fff;font-size:22px;margin:5px 0;}
#restartBtn{margin-top:30px;padding:16px 40px;font-size:22px;font-weight:bold;color:#fff;background:linear-gradient(135deg,#ff69b4,#9b59b6);border:none;border-radius:50px;cursor:pointer;pointer-events:all;box-shadow:0 0 20px rgba(255,105,180,0.5);}

/* Touch Controls */
#touchControls{position:fixed;bottom:0;left:0;width:100%;height:200px;z-index:50;display:none;pointer-events:none;}
#joystickArea{position:absolute;bottom:30px;left:30px;width:130px;height:130px;pointer-events:all;}
#joystickBase{width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);position:relative;}
#joystickThumb{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.4);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
#gasBtn,#brakeBtn{position:absolute;bottom:40px;width:80px;height:80px;border-radius:50%;font-size:16px;font-weight:bold;color:#fff;border:2px solid rgba(255,255,255,0.3);pointer-events:all;display:flex;align-items:center;justify-content:center;}
#gasBtn{right:30px;background:rgba(0,200,80,0.4);}
#brakeBtn{right:120px;background:rgba(220,40,40,0.4);}

/* Confetti */
.confetti{position:fixed;width:10px;height:10px;z-index:95;pointer-events:none;animation:confettiFall 3s ease-out forwards;}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg);}100%{opacity:0;transform:translateY(100vh) rotate(720deg);}}
</style>
</head>
<body>

<!-- Speed Lines -->
<div id="speedLines"></div>
<!-- Vignette -->
<div id="vignette"></div>

<!-- HUD -->
<div id="hud" style="display:none;">
  <div id="timer">0:00.000</div>
  <div id="bestTime"></div>
  <div id="speedometer"><canvas id="speedCanvas" width="200" height="110"></canvas></div>
  <div id="progressLabel">DISTANCE</div>
  <div id="progressBar"><div id="progressFill"></div></div>
  <div id="minimap"><canvas id="minimapCanvas" width="60" height="200"></canvas></div>
  <div id="penaltyText">-2s PENALTY!</div>
</div>

<!-- Start Screen -->
<div id="startScreen">
  <h1>SuperAsia</h1>
  <div class="subtitle">Highway Racing</div>
  <button id="startBtn">TAP TO RACE</button>
</div>

<!-- Countdown -->
<div id="countdown"><div id="countdownText"></div></div>

<!-- Finish Screen -->
<div id="finishScreen">
  <h2>&#127937; FINISH!</h2>
  <div class="finishMsg">Asia arriva!</div>
  <div class="timeInfo" id="finalTime"></div>
  <div class="timeInfo" id="finalBest"></div>
  <button id="restartBtn">Race Again</button>
</div>

<!-- Touch Controls -->
<div id="touchControls">
  <div id="joystickArea">
    <div id="joystickBase"><div id="joystickThumb"></div></div>
  </div>
  <div id="gasBtn">GAS</div>
  <div id="brakeBtn">BRAKE</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script>
(function(){

// ==================== GLOBALS ====================
const ROAD_LENGTH = 3000;
const ROAD_WIDTH = 36;
const LANE_COUNT = 6;
const LANE_WIDTH = ROAD_WIDTH / LANE_COUNT;
const FINISH_Z = -ROAD_LENGTH;
const MAX_SPEED = 3.0;
const ACCEL = 0.025;
const BRAKE_FORCE = 0.04;
const FRICTION = 0.008;
const STEER_SPEED = 0.06;
const STEER_RETURN = 0.03;
const COLLISION_RADIUS = 2.2;
const PENALTY_TIME = 2000;
const AI_COUNT = 12;

let scene, camera, renderer;
let clock = new THREE.Clock();
let playerKart, playerGroup;
let aiCars = [];
let gameState = 'start'; // start, countdown, racing, finish
let raceTime = 0;
let bestTime = localStorage.getItem('superasia_best') ? parseFloat(localStorage.getItem('superasia_best')) : null;
let penaltyTotal = 0;
let speed = 0;
let steering = 0;
let playerZ = 0;
let playerX = 0;
let collisionCooldown = 0;
let hairSegments = [];
let roadCurve = [];
let keys = {};
let isMobile = false;
let touchGas = false;
let touchBrake = false;
let joystickX = 0;
let cameraShake = 0;
let speedLineEls = [];

// ==================== ROAD CURVE DATA ====================
function buildRoadCurve() {
  roadCurve = [];
  for (let z = 0; z > FINISH_Z - 100; z -= 1) {
    let x = 0;
    x += Math.sin(z * 0.002) * 15;
    x += Math.sin(z * 0.0007) * 25;
    roadCurve.push({ z, x });
  }
}

function getRoadX(z) {
  let x = 0;
  x += Math.sin(z * 0.002) * 15;
  x += Math.sin(z * 0.0007) * 25;
  return x;
}

function getRoadDerivX(z) {
  let dx = 0;
  dx += Math.cos(z * 0.002) * 15 * 0.002;
  dx += Math.cos(z * 0.0007) * 25 * 0.0007;
  return dx;
}

// ==================== DETECT MOBILE ====================
function detectMobile() {
  isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
}

// ==================== INIT SCENE ====================
function initScene() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x1a0a2e, 0.0008);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  renderer.outputEncoding = THREE.sRGBEncoding;
  document.body.insertBefore(renderer.domElement, document.body.firstChild);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.5, 2000);
  camera.position.set(0, 4, 10);

  // Ambient
  const ambient = new THREE.AmbientLight(0x334466, 0.6);
  scene.add(ambient);

  // Hemisphere
  const hemi = new THREE.HemisphereLight(0xff8844, 0x223366, 0.4);
  scene.add(hemi);

  // Directional (sunset)
  const sun = new THREE.DirectionalLight(0xffaa55, 0.8);
  sun.position.set(-100, 80, -200);
  sun.castShadow = true;
  sun.shadow.mapSize.width = 2048;
  sun.shadow.mapSize.height = 2048;
  sun.shadow.camera.near = 1;
  sun.shadow.camera.far = 600;
  sun.shadow.camera.left = -60;
  sun.shadow.camera.right = 60;
  sun.shadow.camera.top = 60;
  sun.shadow.camera.bottom = -60;
  scene.add(sun);

  window.addEventListener('resize', onResize);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ==================== SKY ====================
function createSky() {
  const skyGeo = new THREE.SphereGeometry(900, 32, 32);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {},
    vertexShader: `
      varying vec3 vWorldPos;
      void main(){
        vec4 wp = modelMatrix * vec4(position,1.0);
        vWorldPos = wp.xyz;
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `,
    fragmentShader: `
      varying vec3 vWorldPos;
      void main(){
        float h = normalize(vWorldPos).y;
        vec3 bottom = vec3(0.95,0.4,0.15);
        vec3 mid = vec3(0.85,0.25,0.45);
        vec3 top = vec3(0.08,0.03,0.18);
        vec3 col;
        if(h < 0.0) col = bottom;
        else if(h < 0.3) col = mix(bottom, mid, h/0.3);
        else col = mix(mid, top, (h-0.3)/0.7);
        gl_FragColor = vec4(col,1.0);
      }
    `
  });
  const sky = new THREE.Mesh(skyGeo, skyMat);
  scene.add(sky);

  // Clouds
  const cloudMat = new THREE.MeshBasicMaterial({ color: 0xff9966, transparent: true, opacity: 0.2 });
  for (let i = 0; i < 30; i++) {
    const s = 30 + Math.random() * 60;
    const cloud = new THREE.Mesh(new THREE.SphereGeometry(s, 8, 6), cloudMat);
    cloud.scale.y = 0.3;
    cloud.position.set(
      (Math.random() - 0.5) * 1400,
      100 + Math.random() * 200,
      (Math.random() - 0.5) * 1400
    );
    scene.add(cloud);
  }
}

// ==================== HIGHWAY BUILDER ====================
function createHighway() {
  const segLen = 20;
  const numSegs = Math.ceil(ROAD_LENGTH / segLen) + 2;

  for (let i = 0; i < numSegs; i++) {
    const z0 = -i * segLen;
    const z1 = -(i + 1) * segLen;
    const x0 = getRoadX(z0);
    const x1 = getRoadX(z1);

    // Road segment
    const roadGeo = new THREE.BufferGeometry();
    const hw = ROAD_WIDTH / 2;
    const verts = new Float32Array([
      x0 - hw, 0, z0,  x0 + hw, 0, z0,  x1 + hw, 0, z1,
      x0 - hw, 0, z0,  x1 + hw, 0, z1,  x1 - hw, 0, z1
    ]);
    roadGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
    roadGeo.computeVertexNormals();
    const roadMat = new THREE.MeshStandardMaterial({
      color: 0x222222,
      roughness: 0.7,
      metalness: 0.1
    });
    const roadMesh = new THREE.Mesh(roadGeo, roadMat);
    roadMesh.receiveShadow = true;
    scene.add(roadMesh);

    // Lane markings
    if (i % 2 === 0) {
      for (let lane = 1; lane < LANE_COUNT; lane++) {
        const lx0 = x0 - hw + lane * LANE_WIDTH;
        const lx1 = x1 - hw + lane * LANE_WIDTH;
        const isEdge = (lane === 3);
        const lineW = isEdge ? 0.15 : 0.08;
        const lineColor = isEdge ? 0xffcc00 : 0xffffff;

        const lineGeo = new THREE.BufferGeometry();
        const lv = new Float32Array([
          lx0 - lineW, 0.01, z0,  lx0 + lineW, 0.01, z0,  lx1 + lineW, 0.01, z1 + segLen * 0.4,
          lx0 - lineW, 0.01, z0,  lx1 + lineW, 0.01, z1 + segLen * 0.4,  lx1 - lineW, 0.01, z1 + segLen * 0.4
        ]);
        lineGeo.setAttribute('position', new THREE.BufferAttribute(lv, 3));
        const lineMat = new THREE.MeshBasicMaterial({ color: lineColor });
        scene.add(new THREE.Mesh(lineGeo, lineMat));
      }
    }

    // Cat-eyes (reflective road dots)
    if (i % 3 === 0) {
      for (let lane = 0; lane <= LANE_COUNT; lane++) {
        const cx = x0 - hw + lane * LANE_WIDTH;
        const catEye = new THREE.Mesh(
          new THREE.BoxGeometry(0.2, 0.06, 0.3),
          new THREE.MeshStandardMaterial({ color: 0xffff88, emissive: 0xffff44, emissiveIntensity: 0.8 })
        );
        catEye.position.set(cx, 0.03, z0);
        scene.add(catEye);
      }
    }

    // Barriers
    if (i % 1 === 0) {
      for (let side = -1; side <= 1; side += 2) {
        const bx0 = (side === -1) ? x0 - hw - 1.5 : x0 + hw + 1.5;
        const barrier = new THREE.Mesh(
          new THREE.BoxGeometry(0.3, 0.8, segLen),
          new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.7, roughness: 0.3 })
        );
        barrier.position.set(bx0, 0.4, z0 - segLen / 2);
        barrier.castShadow = true;
        scene.add(barrier);

        // Barrier posts
        if (i % 3 === 0) {
          const post = new THREE.Mesh(
            new THREE.CylinderGeometry(0.08, 0.08, 1, 6),
            new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8 })
          );
          post.position.set(bx0, 0.5, z0);
          scene.add(post);
        }
      }
    }

    // Light poles
    if (i % 5 === 0 && i > 0) {
      for (let side = -1; side <= 1; side += 2) {
        const px = (side === -1) ? x0 - hw - 3 : x0 + hw + 3;
        
        // Pole
        const pole = new THREE.Mesh(
          new THREE.CylinderGeometry(0.15, 0.2, 10, 8),
          new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.6 })
        );
        pole.position.set(px, 5, z0);
        pole.castShadow = true;
        scene.add(pole);

        // Arm
        const arm = new THREE.Mesh(
          new THREE.BoxGeometry(3 * -side, 0.12, 0.12),
          new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.6 })
        );
        arm.position.set(px + 1.5 * -side, 10, z0);
        scene.add(arm);

        // Light fixture
        const fixture = new THREE.Mesh(
          new THREE.BoxGeometry(1.5, 0.15, 0.6),
          new THREE.MeshStandardMaterial({ color: 0xffffcc, emissive: 0xffaa44, emissiveIntensity: 1.5 })
        );
        fixture.position.set(px + 2.5 * -side, 9.9, z0);
        scene.add(fixture);

        // Point light
        const light = new THREE.PointLight(0xff9944, 1.2, 40, 2);
        light.position.set(px + 2.5 * -side, 9.5, z0);
        scene.add(light);
      }
    }

    // Road signs
    if (i % 15 === 0 && i > 0) {
      const signSide = (i % 30 === 0) ? -1 : 1;
      const sx = getRoadX(z0) + signSide * (hw + 4);
      const signGroup = new THREE.Group();
      
      // Sign board
      const board = new THREE.Mesh(
        new THREE.BoxGeometry(8, 3, 0.2),
        new THREE.MeshStandardMaterial({ color: 0x006633 })
      );
      board.position.y = 8;
      signGroup.add(board);

      // White text area
      const textArea = new THREE.Mesh(
        new THREE.BoxGeometry(7, 1, 0.25),
        new THREE.MeshBasicMaterial({ color: 0xffffff })
      );
      textArea.position.y = 8;
      signGroup.add(textArea);

      // Posts
      for (let sp = -1; sp <= 1; sp += 2) {
        const spost = new THREE.Mesh(
          new THREE.CylinderGeometry(0.12, 0.12, 8, 6),
          new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.5 })
        );
        spost.position.set(sp * 3, 4, 0);
        signGroup.add(spost);
      }

      signGroup.position.set(sx, 0, z0);
      scene.add(signGroup);
    }

    // Overpasses
    if (i === 25 || i === 60 || i === 100) {
      const oz = z0;
      const ox = getRoadX(oz);
      
      // Bridge deck
      const bridge = new THREE.Mesh(
        new THREE.BoxGeometry(ROAD_WIDTH + 20, 1.5, 6),
        new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.8 })
      );
      bridge.position.set(ox, 8, oz);
      bridge.castShadow = true;
      scene.add(bridge);

      // Pillars
      for (let ps = -1; ps <= 1; ps += 2) {
        const pillar = new THREE.Mesh(
          new THREE.BoxGeometry(1.5, 8, 1.5),
          new THREE.MeshStandardMaterial({ color: 0x444444 })
        );
        pillar.position.set(ox + ps * (hw + 2), 4, oz);
        pillar.castShadow = true;
        scene.add(pillar);
      }
    }
  }

  // Finish line
  const finishGeo = new THREE.PlaneGeometry(ROAD_WIDTH, 4);
  const finishCanvas = document.createElement('canvas');
  finishCanvas.width = 256;
  finishCanvas.height = 64;
  const fctx = finishCanvas.getContext('2d');
  const sq = 16;
  for (let fy = 0; fy < 64; fy += sq) {
    for (let fx = 0; fx < 256; fx += sq) {
      fctx.fillStyle = ((fx / sq + fy / sq) % 2 === 0) ? '#fff' : '#000';
      fctx.fillRect(fx, fy, sq, sq);
    }
  }
  const finishTex = new THREE.CanvasTexture(finishCanvas);
  finishTex.wrapS = THREE.RepeatWrapping;
  const finishMat = new THREE.MeshBasicMaterial({ map: finishTex, side: THREE.DoubleSide });
  const finishLine = new THREE.Mesh(finishGeo, finishMat);
  finishLine.rotation.x = -Math.PI / 2;
  finishLine.position.set(getRoadX(FINISH_Z), 0.05, FINISH_Z);
  scene.add(finishLine);

  // Finish banner
  const bannerGeo = new THREE.PlaneGeometry(ROAD_WIDTH, 3);
  const bannerMat = new THREE.MeshBasicMaterial({ color: 0xff69b4, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
  const banner = new THREE.Mesh(bannerGeo, bannerMat);
  banner.position.set(getRoadX(FINISH_Z), 6, FINISH_Z);
  scene.add(banner);

  // Ground planes on sides
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a3300, roughness: 1 });
  for (let gi = 0; gi < 6; gi++) {
    const gz = -gi * 500;
    const gx = getRoadX(gz);
    for (let side = -1; side <= 1; side += 2) {
      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(200, 600),
        groundMat
      );
      ground.rotation.x = -Math.PI / 2;
      ground.position.set(gx + side * 120, -0.1, gz - 250);
      scene.add(ground);
    }
  }

  // Distant city silhouette
  const cityMat = new THREE.MeshBasicMaterial({ color: 0x110022 });
  for (let ci = 0; ci < 40; ci++) {
    const bh = 20 + Math.random() * 80;
    const bw = 8 + Math.random() * 15;
    const bd = 8 + Math.random() * 15;
    const building = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), cityMat);
    const angle = (ci / 40) * Math.PI * 2;
    building.position.set(
      Math.cos(angle) * (400 + Math.random() * 100),
      bh / 2,
      Math.sin(angle) * (400 + Math.random() * 100) - 1500
    );
    scene.add(building);

    // Window lights
    if (Math.random() > 0.3) {
      const wMat = new THREE.MeshBasicMaterial({ color: 0xffcc66, transparent: true, opacity: 0.6 });
      for (let wy = 0; wy < bh - 5; wy += 6) {
        for (let wx = -bw / 2 + 2; wx < bw / 2 - 2; wx += 4) {
          if (Math.random() > 0.4) {
            const win = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 2), wMat);
            win.position.set(
              building.position.x + (Math.random() > 0.5 ? bw / 2 + 0.1 : -bw / 2 - 0.1),
              wy + 3,
              building.position.z + wx
            );
            win.rotation.y = Math.random() > 0.5 ? 0 : Math.PI / 2;
            scene.add(win);
          }
        }
      }
    }
  }
}

// ==================== HUD DRAWING ====================
function drawSpeedometer(spd) {
  const canvas = document.getElementById('speedCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 200, 110);

  const cx = 100, cy = 100, r = 80;
  const startAngle = Math.PI * 0.8;
  const endAngle = Math.PI * 0.2;
  const totalAngle = (2 * Math.PI) - (startAngle - endAngle);
  const spdRatio = Math.min(spd / MAX_SPEED, 1);
  const currentAngle = startAngle + totalAngle * spdRatio;

  // Background arc
  ctx.beginPath();
  ctx.arc(cx, cy, r, startAngle, startAngle + totalAngle);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 8;
  ctx.stroke();

  // Speed arc
  const grad = ctx.createLinearGradient(0, 0, 200, 0);
  grad.addColorStop(0, '#33ff88');
  grad.addColorStop(0.5, '#ffcc00');
  grad.addColorStop(1, '#ff3333');
  ctx.beginPath();
  ctx.arc(cx, cy, r, startAngle, currentAngle);
  ctx.strokeStyle = grad;
  ctx.lineWidth = 8;
  ctx.stroke();

  // Tick marks
  for (let t = 0; t <= 10; t++) {
    const a = startAngle + (totalAngle * t / 10);
    const x1 = cx + Math.cos(a) * (r - 12);
    const y1 = cy + Math.sin(a) * (r - 12);
    const x2 = cx + Math.cos(a) * (r - 4);
    const y2 = cy + Math.sin(a) * (r - 4);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Needle
  const nx = cx + Math.cos(currentAngle) * (r - 20);
  const ny = cy + Math.sin(currentAngle) * (r - 20);
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(nx, ny);
  ctx.strokeStyle = '#ff69b4';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#ff69b4';
  ctx.fill();

  // Speed text
  const kmh = Math.round(spdRatio * 180);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px Segoe UI';
  ctx.textAlign = 'center';
  ctx.fillText(kmh, cx, cy - 15);
  ctx.font = '10px Segoe UI';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText('km/h', cx, cy - 2);
}

function drawMinimap() {
  const canvas = document.getElementById('minimapCanvas');
  const ctx = canvas.getContext('2d');
  const w = 60, h = 200;
  ctx.clearRect(0, 0, w, h);

  // Road
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 8;
  ctx.beginPath();
  for (let i = 0; i <= 100; i++) {
    const z = -(i / 100) * ROAD_LENGTH;
    const rx = getRoadX(z);
    const mx = w / 2 + rx * 0.06;
    const my = h - (i / 100) * h;
    if (i === 0) ctx.moveTo(mx, my);
    else ctx.lineTo(mx, my);
  }
  ctx.stroke();

  // Player dot
  const pProgress = Math.min(Math.abs(playerZ) / ROAD_LENGTH, 1);
  const prx = getRoadX(playerZ);
  ctx.beginPath();
  ctx.arc(w / 2 + prx * 0.06, h - pProgress * h, 3, 0, Math.PI * 2);
  ctx.fillStyle = '#ff69b4';
  ctx.fill();

  // AI dots
  aiCars.forEach(ai => {
    const ap = Math.min(Math.abs(ai.z) / ROAD_LENGTH, 1);
    const arx = getRoadX(ai.z);
    ctx.beginPath();
    ctx.arc(w / 2 + arx * 0.06, h - ap * h, 2, 0, Math.PI * 2);
    ctx.fillStyle = '#ff3333';
    ctx.fill();
  });

  // Finish marker
  ctx.fillStyle = '#ffd700';
  ctx.fillRect(w / 2 - 10, 1, 20, 2);
}

function formatTime(ms) {
  const totalSec = ms / 1000;
  const min = Math.floor(totalSec / 60);
  const sec = Math.floor(totalSec % 60);
  const millis = Math.floor(ms % 1000);
  return min + ':' + String(sec).padStart(2, '0') + '.' + String(millis).padStart(3, '0');
}

// ==================== CONTROLS ====================
function setupControls() {
  document.addEventListener('keydown', e => { keys[e.code] = true; });
  document.addEventListener('keyup', e => { keys[e.code] = false; });

  if (isMobile) {
    document.getElementById('touchControls').style.display = 'block';

    // Gas button
    const gasBtn = document.getElementById('gasBtn');
    gasBtn.addEventListener('touchstart', e => { e.preventDefault(); touchGas = true; });
    gasBtn.addEventListener('touchend', e => { e.preventDefault(); touchGas = false; });
    gasBtn.addEventListener('touchcancel', e => { touchGas = false; });

    // Brake button
    const brakeBtn = document.getElementById('brakeBtn');
    brakeBtn.addEventListener('touchstart', e => { e.preventDefault(); touchBrake = true; });
    brakeBtn.addEventListener('touchend', e => { e.preventDefault(); touchBrake = false; });
    brakeBtn.addEventListener('touchcancel', e => { touchBrake = false; });

    // Joystick
    const jArea = document.getElementById('joystickArea');
    const jThumb = document.getElementById('joystickThumb');
    let jActive = false;
    let jCenterX = 0, jCenterY = 0;

    jArea.addEventListener('touchstart', e => {
      e.preventDefault();
      jActive = true;
      const rect = jArea.getBoundingClientRect();
      jCenterX = rect.left + rect.width / 2;
      jCenterY = rect.top + rect.height / 2;
    });

    document.addEventListener('touchmove', e => {
      if (!jActive) return;
      const touch = Array.from(e.touches).find(t => {
        const rect = document.getElementById('joystickArea').getBoundingClientRect();
        return t.clientX < rect.right + 60;
      });
      if (!touch) return;
      const dx = touch.clientX - jCenterX;
      const maxD = 50;
      const clamped = Math.max(-maxD, Math.min(maxD, dx));
      joystickX = clamped / maxD;
      jThumb.style.transform = `translate(calc(-50% + ${clamped}px), -50%)`;
    });

    document.addEventListener('touchend', e => {
      if (e.touches.length === 0 || !Array.from(e.touches).some(t => {
        const rect = document.getElementById('joystickArea').getBoundingClientRect();
        return t.clientX < rect.right + 60;
      })) {
        jActive = false;
        joystickX = 0;
        jThumb.style.transform = 'translate(-50%, -50%)';
      }
    });
  }
}

// ==================== GAME STATE MANAGEMENT ====================
function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('countdown').style.display = 'flex';
  document.getElementById('hud').style.display = 'block';
  gameState = 'countdown';
  speed = 0;
  playerZ = 0;
  playerX = 0;
  steering = 0;
  raceTime = 0;
  penaltyTotal = 0;
  collisionCooldown = 0;
  playerGroup.position.set(getRoadX(0), 0, 0);

  // Reset AI
  aiCars.forEach((ai, i) => {
    const lane = Math.floor(Math.random() * LANE_COUNT);
    const z = -(100 + Math.random() * (ROAD_LENGTH - 200));
    const roadX = getRoadX(z);
    const laneX = roadX - ROAD_WIDTH / 2 + (lane + 0.5) * LANE_WIDTH;
    ai.lane = lane;
    ai.targetLane = lane;
    ai.z = z;
    ai.mesh.position.set(laneX, 0, z);
    ai.laneChangeTimer = Math.random() * 300;
  });

  doCountdown();
}

function doCountdown() {
  const cdEl = document.getElementById('countdownText');
  let count = 3;
  cdEl.textContent = count;

  const interval = setInterval(() => {
    count--;
    if (count > 0) {
      cdEl.textContent = count;
      cdEl.style.animation = 'none';
      void cdEl.offsetWidth;
      cdEl.style.animation = 'countPop .4s ease-out';
    } else if (count === 0) {
      cdEl.textContent = 'GO!';
      cdEl.style.color = '#ff69b4';
      cdEl.style.animation = 'none';
      void cdEl.offsetWidth;
      cdEl.style.animation = 'countPop .4s ease-out';
    } else {
      clearInterval(interval);
      document.getElementById('countdown').style.display = 'none';
      cdEl.style.color = '#fff';
      gameState = 'racing';
    }
  }, 1000);
}

function finishRace() {
  gameState = 'finish';
  const finalTime = raceTime + penaltyTotal;
  
  if (!bestTime || finalTime < bestTime) {
    bestTime = finalTime;
    localStorage.setItem('superasia_best', bestTime.toString());
  }

  document.getElementById('finalTime').textContent = 'Your Time: ' + formatTime(finalTime);
  document.getElementById('finalBest').textContent = 'Best Time: ' + formatTime(bestTime);
  document.getElementById('finishScreen').style.display = 'flex';
  spawnConfetti();
}

function restartGame() {
  document.getElementById('finishScreen').style.display = 'none';
  startGame();
}

// ==================== GAME LOOP ====================
function update(dt) {
  if (gameState !== 'racing') {
    // Idle animation in start state
    if (gameState === 'start' && playerGroup) {
      playerGroup.rotation.y += dt * 0.3;
      playerGroup.position.y = 0.1 + Math.sin(Date.now() * 0.002) * 0.1;
    }
    return;
  }

  raceTime += dt * 1000;
  if (collisionCooldown > 0) collisionCooldown -= dt * 1000;

  // Input
  let accelInput = 0;
  let steerInput = 0;

  if (keys['ArrowUp'] || keys['KeyW']) accelInput = 1;
  if (keys['ArrowDown'] || keys['KeyS']) accelInput = -1;
  if (keys['ArrowLeft'] || keys['KeyA']) steerInput = -1;
  if (keys['ArrowRight'] || keys['KeyD']) steerInput = 1;

  if (isMobile) {
    if (touchGas) accelInput = 1;
    if (touchBrake) accelInput = -1;
    steerInput = joystickX;
  }

  // Speed
  if (accelInput > 0) {
    speed += ACCEL * accelInput;
  } else if (accelInput < 0) {
    speed -= BRAKE_FORCE;
  }
  speed -= FRICTION;
  speed = Math.max(0, Math.min(MAX_SPEED, speed));

  // Steering
  if (Math.abs(steerInput) > 0.1) {
    steering += steerInput * STEER_SPEED;
  } else {
    if (steering > 0) steering = Math.max(0, steering - STEER_RETURN);
    else if (steering < 0) steering = Math.min(0, steering + STEER_RETURN);
  }
  steering = Math.max(-1.5, Math.min(1.5, steering));

  // Road curve offset
  const roadXAtPlayer = getRoadX(playerZ);
  const roadDx = getRoadDerivX(playerZ);

  // Move player
  playerZ -= speed;
  playerX += steering * 0.15;

  // Clamp to road
  const hw = ROAD_WIDTH / 2 - 1.5;
  playerX = Math.max(-hw, Math.min(hw, playerX));

  // Position player
  playerGroup.position.x = roadXAtPlayer + playerX;
  playerGroup.position.z = playerZ;
  playerGroup.position.y = 0;
  playerGroup.rotation.y = -steering * 0.15;
  playerGroup.rotation.z = -steering * 0.05;

  // Wheel spin
  if (playerGroup.wheels) {
    playerGroup.wheels.forEach(w => {
      w.rotation.x += speed * 0.5;
    });
  }

  // Exhaust flames
  if (playerGroup.exhaustFlames) {
    const showFlame = accelInput > 0 && speed > 0.5;
    playerGroup.exhaustFlames.forEach(f => {
      f.visible = showFlame;
      if (showFlame) {
        f.scale.set(0.8 + Math.random() * 0.4, 0.8 + Math.random() * 0.4, 0.6 + Math.random() * 0.8);
      }
    });
  }

  // Hair animation
  const speedFactor = speed / MAX_SPEED;
  hairSegments.forEach(strand => {
    strand.forEach((seg, si) => {
      const baseZ = 0.35 + si * 0.2;
      const baseY = 1.5 - si * 0.06;
      const blow = speedFactor * si * 0.06;
      const wave = Math.sin(Date.now() * 0.005 + si * 0.8) * 0.03 * (1 + speedFactor * 3);
      const sway = Math.sin(Date.now() * 0.003 + si * 0.5) * 0.02;
      seg.position.z = baseZ + blow;
      seg.position.y = baseY - blow * 0.3 + wave;
      seg.position.x = seg.position.x * 0.95 + (seg.position.x + sway) * 0.05;
      seg.rotation.x = blow * 0.5;
    });
  });

  // AI cars
  aiCars.forEach(ai => {
    ai.z += ai.speed * 0.3;
    if (ai.z > 100) {
      ai.z = -(ROAD_LENGTH - 50 + Math.random() * 100);
      ai.lane = Math.floor(Math.random() * LANE_COUNT);
      ai.targetLane = ai.lane;
    }

    // Lane changes
    ai.laneChangeTimer -= 1;
    if (ai.laneChangeTimer <= 0) {
      ai.targetLane = Math.max(0, Math.min(LANE_COUNT - 1, ai.lane + Math.floor(Math.random() * 3) - 1));
      ai.laneChangeTimer = 200 + Math.random() * 400;
    }

    if (ai.lane !== ai.targetLane) {
      ai.lane += (ai.targetLane - ai.lane) * 0.01;
      if (Math.abs(ai.lane - ai.targetLane) < 0.05) ai.lane = ai.targetLane;
    }

    const aiRoadX = getRoadX(ai.z);
    const targetX = aiRoadX - ROAD_WIDTH / 2 + (ai.lane + 0.5) * LANE_WIDTH;
    ai.mesh.position.x += (targetX - ai.mesh.position.x) * 0.05;
    ai.mesh.position.z = ai.z;

    // Collision
    if (collisionCooldown <= 0) {
      const dx = playerGroup.position.x - ai.mesh.position.x;
      const dz = playerGroup.position.z - ai.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      if (dist < COLLISION_RADIUS) {
        speed *= 0.3;
        penaltyTotal += PENALTY_TIME;
        collisionCooldown = 1000;
        cameraShake = 0.5;

        // Bounce
        const norm = dx / (dist + 0.01);
        playerX += norm * 2;

        // Visual feedback
        document.getElementById('vignette').style.opacity = '1';
        setTimeout(() => { document.getElementById('vignette').style.opacity = '0'; }, 300);

        const penText = document.getElementById('penaltyText');
        penText.style.opacity = '1';
        setTimeout(() => { penText.style.opacity = '0'; }, 800);
      }
    }
  });

  // Camera
  const camTargetX = playerGroup.position.x - steering * 2;
  const camTargetZ = playerZ + 8 + speed * 2;
  const camTargetY = 3 + speed * 0.5;

  camera.position.x += (camTargetX - camera.position.x) * 0.06;
  camera.position.z += (camTargetZ - camera.position.z) * 0.06;
  camera.position.y += (camTargetY - camera.position.y) * 0.06;

  // Camera shake
  if (cameraShake > 0) {
    camera.position.x += (Math.random() - 0.5) * cameraShake;
    camera.position.y += (Math.random() - 0.5) * cameraShake * 0.5;
    cameraShake *= 0.9;
  }

  const lookTarget = new THREE.Vector3(
    playerGroup.position.x,
    playerGroup.position.y + 1.5,
    playerGroup.position.z - 5
  );
  camera.lookAt(lookTarget);

  // FOV speed effect
  const targetFov = 60 + speedFactor * 20;
  camera.fov += (targetFov - camera.fov) * 0.05;
  camera.updateProjectionMatrix();

  // Speed lines
  const slOpacity = Math.max(0, speedFactor - 0.5) * 2;
  document.getElementById('speedLines').style.opacity = slOpacity.toString();

  // HUD
  document.getElementById('timer').textContent = formatTime(raceTime + penaltyTotal);
  if (bestTime) {
    document.getElementById('bestTime').textContent = 'Best: ' + formatTime(bestTime);
  }
  drawSpeedometer(speed);

  const progress = Math.min(Math.abs(playerZ) / ROAD_LENGTH * 100, 100);
  document.getElementById('progressFill').style.width = progress + '%';

  drawMinimap();

  // Finish check
  if (playerZ <= FINISH_Z) {
    finishRace();
  }
}

// ==================== MAIN LOOP ====================
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  update(dt);
  renderer.render(scene, camera);
}

// ==================== INIT ====================
function init() {
  detectMobile();
  buildRoadCurve();
  initScene();
  createSky();
  createHighway();
  createPlayerKart();
  spawnAICars();
  createSpeedLines();
  setupControls();

  if (bestTime) {
    document.getElementById('bestTime').textContent = 'Best: ' + formatTime(bestTime);
  }

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('startBtn').addEventListener('touchstart', e => {
    e.preventDefault();
    startGame();
  });
  document.getElementById('restartBtn').addEventListener('click', restartGame);
  document.getElementById('restartBtn').addEventListener('touchstart', e => {
    e.preventDefault();
    restartGame();
  });

  // Start animation
  animate();
}

init();

})();
</script>
</body>
