<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SuperAsia</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; touch-action: none; }
canvas { display: block; width: 100vw; height: 100vh; }

/* ── OVERLAY SCREENS ── */
#overlay {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 10;
  background: linear-gradient(135deg, #ff6fb7 0%, #ffb347 50%, #6fe8ff 100%);
  transition: opacity .4s;
}
#overlay.hidden { opacity: 0; pointer-events: none; }
#overlay h1 {
  font-size: min(16vw, 100px); font-weight: 900; color: #fff;
  text-shadow: 4px 4px 0 #e84393, 8px 8px 0 #6c5ce7;
  letter-spacing: .04em; margin-bottom: 10px;
}
#overlay .subtitle { font-size: min(5vw, 28px); color: #fff; margin-bottom: 30px; }
#overlay .prompt {
  font-size: min(5vw, 26px); color: #fff; padding: 14px 40px;
  border: 3px solid #fff; border-radius: 40px;
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.08); } }
.char-preview {
  width: min(40vw, 180px); height: min(40vw, 180px);
  margin-bottom: 20px; position: relative;
}
.char-preview .body { width: 60%; height: 50%; background: #ff69b4; border-radius: 14px;
  position: absolute; bottom: 0; left: 20%; }
.char-preview .head { width: 40%; height: 35%; background: #fdd; border-radius: 50%;
  position: absolute; top: 8%; left: 30%; }
.char-preview .hair { width: 44%; height: 22%; background: #6b3a2a; border-radius: 50% 50% 0 0;
  position: absolute; top: 4%; left: 28%; }
.char-preview .eye-l, .char-preview .eye-r {
  width: 8%; height: 8%; background: #8B7355; border-radius: 50%; position: absolute; top: 24%;
}
.char-preview .eye-l { left: 36%; } .char-preview .eye-r { left: 56%; }

/* ── COUNTDOWN ── */
#countdown {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  z-index: 10; pointer-events: none;
}
#countdown span {
  font-size: min(30vw, 200px); font-weight: 900; color: #fff;
  text-shadow: 0 0 40px rgba(255,255,255,.6);
  animation: countPop .7s ease-out forwards;
}
@keyframes countPop {
  0% { transform: scale(2.5); opacity: 0; }
  40% { transform: scale(1); opacity: 1; }
  100% { transform: scale(.8); opacity: 0; }
}

/* ── FINISH SCREEN ── */
#finishScreen {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 10;
  background: rgba(0,0,0,.7); backdrop-filter: blur(6px);
}
#finishScreen.hidden { display: none; }
#finishScreen h2 { font-size: min(10vw, 64px); color: #ffe66d; margin-bottom: 10px; }
#finishScreen .time-display { font-size: min(8vw, 48px); color: #fff; margin-bottom: 6px; }
#finishScreen .best-display { font-size: min(5vw, 28px); color: #6fe8ff; margin-bottom: 30px; }
#finishScreen .play-again {
  font-size: min(5vw, 26px); color: #fff; padding: 14px 40px;
  background: #e84393; border: none; border-radius: 40px; cursor: pointer;
}

/* ── HUD ── */
#hud {
  position: fixed; top: 0; left: 0; right: 0; padding: 10px 16px;
  display: flex; justify-content: space-between; align-items: flex-start;
  z-index: 5; pointer-events: none; font-weight: 700; color: #fff;
  text-shadow: 1px 1px 3px rgba(0,0,0,.7);
}
#hud.hidden { display: none; }
.hud-item { font-size: min(4vw, 20px); line-height: 1.5; }
.hud-left, .hud-right { display: flex; flex-direction: column; }
.hud-center { text-align: center; }

/* ── COLLISION FLASH ── */
#flash {
  position: fixed; inset: 0; background: rgba(255,0,0,.35); z-index: 8;
  pointer-events: none; opacity: 0; transition: opacity .12s;
}
#flash.active { opacity: 1; }

/* ── TOUCH CONTROLS ── */
#touch-controls {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: none; z-index: 6; padding: 12px;
  justify-content: space-between; pointer-events: none;
}
#touch-controls.visible { display: flex; }
.btn-group { display: flex; gap: 8px; pointer-events: auto; }
.tbtn {
  width: min(18vw, 80px); height: min(18vw, 80px);
  background: rgba(255,255,255,.25); border: 2px solid rgba(255,255,255,.5);
  border-radius: 18px; color: #fff; font-size: min(8vw, 36px);
  display: flex; align-items: center; justify-content: center;
  user-select: none; -webkit-user-select: none;
  backdrop-filter: blur(4px); transition: background .1s;
}
.tbtn:active, .tbtn.pressed { background: rgba(255,255,255,.5); }
.btn-group-left { flex-direction: row; align-items: flex-end; }
.btn-group-right { flex-direction: row; align-items: flex-end; }
.btn-col { display: flex; flex-direction: column; gap: 8px; }

/* ── ROTATE MESSAGE ── */
#rotate-msg {
  position: fixed; inset: 0; background: #1a1a2e; z-index: 100;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; font-size: 22px; text-align: center; padding: 20px;
}
#rotate-msg .icon { font-size: 60px; margin-bottom: 16px; }

/* ── MINIMAP ── */
#minimap {
  position: fixed; bottom: 100px; right: 12px; width: min(20vw, 100px); height: min(50vh, 260px);
  background: rgba(0,0,0,.45); border: 2px solid rgba(255,255,255,.3);
  border-radius: 10px; z-index: 5; overflow: hidden;
}
#minimap.hidden { display: none; }
#minimap canvas { width: 100%; height: 100%; }
</style>
</head>
<body>

<!-- OVERLAY: Start Screen -->
<div id="overlay">
  <h1>SuperAsia</h1>
  <div class="char-preview">
    <div class="hair"></div><div class="head"></div>
    <div class="eye-l"></div><div class="eye-r"></div>
    <div class="body"></div>
  </div>
  <div class="subtitle">Race to the finish!</div>
  <div class="prompt" id="startPrompt">PRESS ENTER / TAP TO START</div>
</div>

<!-- Countdown -->
<div id="countdown"></div>

<!-- Finish Screen -->
<div id="finishScreen" class="hidden">
  <h2 id="finishTitle">YOU MADE IT! 🎉</h2>
  <div class="time-display" id="finishTime"></div>
  <div class="best-display" id="finishBest"></div>
  <button class="play-again" id="playAgainBtn">Play Again</button>
</div>

<!-- HUD -->
<div id="hud" class="hidden">
  <div class="hud-left">
    <div class="hud-item" id="hudSpeed">Speed: 0</div>
    <div class="hud-item" id="hudDist">Distance: 2000m</div>
  </div>
  <div class="hud-center">
    <div class="hud-item" id="hudTimer">0.00s</div>
    <div class="hud-item" id="hudBest">Best: --</div>
  </div>
</div>

<!-- Collision Flash -->
<div id="flash"></div>

<!-- Touch Controls -->
<div id="touch-controls">
  <div class="btn-group btn-group-left">
    <div class="tbtn" data-key="left">◀</div>
    <div class="tbtn" data-key="right">▶</div>
  </div>
  <div class="btn-group btn-group-right">
    <div class="btn-col">
      <div class="tbtn" data-key="up">▲</div>
      <div class="tbtn" data-key="down">▼</div>
    </div>
  </div>
</div>

<!-- Rotate Message (portrait mobile) -->
<div id="rotate-msg">
  <div class="icon">📱↔️</div>
  <div>Please rotate your device to landscape mode</div>
</div>

<!-- Minimap -->
<div id="minimap" class="hidden"><canvas id="minimapCanvas"></canvas></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────
const TRACK_LENGTH  = 2200;
const ROAD_WIDTH    = 22;
const LANE_COUNT    = 4;
const BARRIER_H     = 1.2;
const FINISH_Z      = -TRACK_LENGTH;
const AI_COUNT      = 6;
const COLLISION_CD  = 1200;

// ─────────────────────────────────────────────
//  GAME STATE
// ─────────────────────────────────────────────
let state = 'start'; // start | countdown | racing | finish
let clock = 0, bestTime = parseFloat(localStorage.getItem('superasia_best')) || Infinity;
let speed = 0, maxSpeed = 1.6, accel = 0.025, brakeForce = 0.04, friction = 0.007;
let steerAngle = 0, steerSpeed = 0.035, steerReturn = 0.06;
let lastCollisionTime = 0;

const keys = { up:false, down:false, left:false, right:false };

// ─────────────────────────────────────────────
//  THREE.JS  SCENE SETUP
// ─────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();

// Sky gradient via background
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 150, 500);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.5, 600);

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.55);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffffff, 0.85);
sun.position.set(50, 80, 30);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -60; sun.shadow.camera.right = 60;
sun.shadow.camera.top = 60;   sun.shadow.camera.bottom = -60;
scene.add(sun);

// ─────────────────────────────────────────────
//  ROAD BUILDING  (straight with gentle curves)
// ─────────────────────────────────────────────
// Road path: a set of waypoints to give gentle S-curves
const roadPoints = [];
const roadSegLen = 10;
const roadSegs = Math.ceil(TRACK_LENGTH / roadSegLen);

function roadXOffset(z) {
  return Math.sin(z * 0.003) * 18 + Math.sin(z * 0.0007) * 30;
}

for (let i = 0; i <= roadSegs; i++) {
  const z = -i * roadSegLen;
  roadPoints.push(new THREE.Vector3(roadXOffset(-z), 0, z));
}

function getRoadAt(zPos) {
  const t = Math.max(0, Math.min(-zPos / roadSegLen, roadSegs));
  const i = Math.floor(t);
  const f = t - i;
  if (i >= roadSegs) return { x: roadPoints[roadSegs].x, angle: 0 };
  const p0 = roadPoints[i], p1 = roadPoints[Math.min(i+1, roadSegs)];
  const x = p0.x + (p1.x - p0.x) * f;
  const angle = Math.atan2(p1.x - p0.x, p1.z - p0.z);
  return { x, angle };
}

// Build road mesh
const roadGroup = new THREE.Group();
scene.add(roadGroup);

function buildRoadChunk(startIdx, endIdx) {
  const shape = new THREE.Shape();
  const hw = ROAD_WIDTH / 2;
  const pts = [];
  for (let i = startIdx; i <= endIdx; i++) {
    const p = roadPoints[i];
    const next = roadPoints[Math.min(i+1, roadSegs)];
    const dx = next.x - p.x, dz = next.z - p.z;
    const len = Math.sqrt(dx*dx + dz*dz) || 1;
    const nx = -dz/len, nz = dx/len;
    pts.push({ lx: p.x + nx*hw, lz: p.z + nz*hw, rx: p.x - nx*hw, rz: p.z - nz*hw });
  }
  const verts = [], idxs = [], uvs = [];
  for (let i = 0; i < pts.length; i++) {
    const p = pts[i];
    verts.push(p.lx, 0.01, p.lz, p.rx, 0.01, p.rz);
    uvs.push(0, i / pts.length, 1, i / pts.length);
    if (i < pts.length - 1) {
      const b = i * 2;
      idxs.push(b,b+1,b+2, b+1,b+3,b+2);
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(idxs);
  geo.computeVertexNormals();
  return geo;
}

// Road surface
const roadTex = (() => {
  const c = document.createElement('canvas'); c.width = 256; c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#444'; ctx.fillRect(0, 0, 256, 256);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.setLineDash([20, 20]);
  for (let l = 1; l < LANE_COUNT; l++) {
    const x = (l / LANE_COUNT) * 256;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 256); ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.strokeStyle = '#ff0'; ctx.lineWidth = 5;
  ctx.strokeRect(2, 0, 252, 256);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(1, 40);
  return tex;
})();

const CHUNK = 40;
for (let s = 0; s < roadSegs; s += CHUNK) {
  const geo = buildRoadChunk(s, Math.min(s + CHUNK, roadSegs));
  const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ map: roadTex }));
  mesh.receiveShadow = true;
  roadGroup.add(mesh);
}

// Barriers
function buildBarriers() {
  const hw = ROAD_WIDTH / 2 + 0.5;
  const bMat = new THREE.MeshStandardMaterial({ color: 0xdd3333 });
  const bMat2 = new THREE.MeshStandardMaterial({ color: 0xffffff });
  for (let side = -1; side <= 1; side += 2) {
    for (let i = 0; i < roadSegs; i += 2) {
      const p = roadPoints[i];
      const next = roadPoints[Math.min(i+1, roadSegs)];
      const dx = next.x - p.x, dz = next.z - p.z;
      const len = Math.sqrt(dx*dx + dz*dz) || 1;
      const nx = -dz/len * side, nz = dx/len * side;
      const geo = new THREE.BoxGeometry(0.6, BARRIER_H, roadSegLen * 2);
      const mat = (Math.floor(i/2) % 2 === 0) ? bMat : bMat2;
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(p.x + nx * hw, BARRIER_H/2, (p.z + next.z)/2);
      mesh.rotation.y = Math.atan2(dx, dz);
      mesh.castShadow = true;
      roadGroup.add(mesh);
    }
  }
}
buildBarriers();

// Finish line
const finishGeo = new THREE.PlaneGeometry(ROAD_WIDTH + 2, 6);
const finishTex = (() => {
  const c = document.createElement('canvas'); c.width = 128; c.height = 128;
  const ctx = c.getContext('2d');
  const s = 16;
  for (let y = 0; y < 128; y += s)
    for (let x = 0; x < 128; x += s) {
      ctx.fillStyle = ((x/s + y/s) % 2 === 0) ? '#fff' : '#111';
      ctx.fillRect(x, y, s, s);
    }
  return new THREE.CanvasTexture(c);
})();
const finishLine = new THREE.Mesh(finishGeo, new THREE.MeshStandardMaterial({ map: finishTex }));
const fRoad = getRoadAt(FINISH_Z);
finishLine.position.set(fRoad.x, 0.05, FINISH_Z);
finishLine.rotation.x = -Math.PI / 2;
scene.add(finishLine);

// Finish arch
const archMat = new THREE.MeshStandardMaterial({ color: 0xffe66d });
const poleGeo = new THREE.CylinderGeometry(0.3, 0.3, 8, 8);
const beamGeo = new THREE.BoxGeometry(ROAD_WIDTH + 4, 1, 0.6);
const poleL = new THREE.Mesh(poleGeo, archMat);
poleL.position.set(fRoad.x - ROAD_WIDTH/2 - 1, 4, FINISH_Z);
const poleR = new THREE.Mesh(poleGeo, archMat);
poleR.position.set(fRoad.x + ROAD_WIDTH/2 + 1, 4, FINISH_Z);
const beam = new THREE.Mesh(beamGeo, archMat);
beam.position.set(fRoad.x, 8, FINISH_Z);
scene.add(poleL, poleR, beam);

// ─────────────────────────────────────────────
//  GROUND + SCENERY
// ─────────────────────────────────────────────
const groundGeo = new THREE.PlaneGeometry(600, TRACK_LENGTH + 400);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x4caf50 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.set(0, -0.05, -TRACK_LENGTH / 2);
ground.receiveShadow = true;
scene.add(ground);

// Trees along the road
const treeTrunkGeo = new THREE.CylinderGeometry(0.3, 0.5, 3, 6);
const treeTopGeo   = new THREE.ConeGeometry(2, 4, 6);
const treeTrunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
const treeTopColors = [0x2ecc71, 0x27ae60, 0x1abc9c, 0x16a085];

for (let i = 0; i < 200; i++) {
  const z = -Math.random() * TRACK_LENGTH;
  const road = getRoadAt(z);
  const side = (Math.random() < 0.5 ? -1 : 1);
  const dist = ROAD_WIDTH / 2 + 4 + Math.random() * 30;
  const x = road.x + side * dist;
  const trunk = new THREE.Mesh(treeTrunkGeo, treeTrunkMat);
  trunk.position.set(x, 1.5, z);
  trunk.castShadow = true;
  scene.add(trunk);
  const top = new THREE.Mesh(treeTopGeo, new THREE.MeshStandardMaterial({
    color: treeTopColors[i % treeTopColors.length]
  }));
  top.position.set(x, 5, z);
  top.castShadow = true;
  scene.add(top);
}

// ─────────────────────────────────────────────
//  PLAYER CAR
// ─────────────────────────────────────────────
function buildPlayerCar() {
  const group = new THREE.Group();

  // Body
  const bodyGeo = new THREE.BoxGeometry(2, 0.8, 3.6);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff69b4 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.6;
  body.castShadow = true;
  group.add(body);

  // Cabin
  const cabinGeo = new THREE.BoxGeometry(1.7, 0.7, 1.8);
  const cabinMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 });
  const cabin = new THREE.Mesh(cabinGeo, cabinMat);
  cabin.position.set(0, 1.3, -0.2);
  group.add(cabin);

  // Character head
  const headGeo = new THREE.SphereGeometry(0.35, 8, 8);
  const headMat = new THREE.MeshStandardMaterial({ color: 0xfdd5b1 });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.set(0, 1.65, -0.1);
  group.add(head);

  // Hair (brown)
  const hairGeo = new THREE.SphereGeometry(0.38, 8, 8);
  const hairMat = new THREE.MeshStandardMaterial({ color: 0x6b3a2a });
  const hair = new THREE.Mesh(hairGeo, hairMat);
  hair.position.set(0, 1.82, -0.15);
  hair.scale.set(1, 0.7, 1.1);
  group.add(hair);

  // Eyes (hazel)
  const eyeGeo = new THREE.SphereGeometry(0.06, 6, 6);
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0x8B7355 });
  const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
  eyeL.position.set(-0.12, 1.65, 0.22);
  const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
  eyeR.position.set(0.12, 1.65, 0.22);
  group.add(eyeL, eyeR);

  // Wheels
  const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.25, 12);
  const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
  const offsets = [[-1, 0.35, 1.2],[1, 0.35, 1.2],[-1, 0.35, -1.2],[1, 0.35, -1.2]];
  offsets.forEach(([x,y,z]) => {
    const w = new THREE.Mesh(wheelGeo, wheelMat);
    w.rotation.z = Math.PI / 2;
    w.position.set(x, y, z);
    group.add(w);
  });

  // Headlights
  const hlGeo = new THREE.SphereGeometry(0.15, 6, 6);
  const hlMat = new THREE.MeshStandardMaterial({ color: 0xffffaa, emissive: 0xffffaa, emissiveIntensity: 0.5 });
  const hlL = new THREE.Mesh(hlGeo, hlMat);
  hlL.position.set(-0.7, 0.7, 1.85);
  const hlR = new THREE.Mesh(hlGeo, hlMat);
  hlR.position.set(0.7, 0.7, 1.85);
  group.add(hlL, hlR);

  return group;
}

const playerCar = buildPlayerCar();
scene.add(playerCar);

// ─────────────────────────────────────────────
//  AI CARS
// ─────────────────────────────────────────────
const aiColors = [0x3498db, 0xe74c3c, 0xf1c40f, 0x9b59b6, 0xe67e22, 0x1abc9c];
const aiCars = [];

function buildAICar(color) {
  const g = new THREE.Group();
  const bodyGeo = new THREE.BoxGeometry(1.8, 0.75, 3.2);
  const body = new THREE.Mesh(bodyGeo, new THREE.MeshStandardMaterial({ color }));
  body.position.y = 0.6;
  body.castShadow = true;
  g.add(body);
  const cabGeo = new THREE.BoxGeometry(1.5, 0.6, 1.4);
  const cab = new THREE.Mesh(cabGeo, new THREE.MeshStandardMaterial({ color: 0xaaddff, transparent:true, opacity:0.5 }));
  cab.position.set(0, 1.2, -0.1);
  g.add(cab);
  const wGeo = new THREE.CylinderGeometry(0.32, 0.32, 0.22, 10);
  const wMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
  [[-0.9,0.32,1],[ 0.9,0.32,1],[-0.9,0.32,-1],[0.9,0.32,-1]].forEach(([x,y,z]) => {
    const w = new THREE.Mesh(wGeo, wMat);
    w.rotation.z = Math.PI/2;
    w.position.set(x,y,z);
    g.add(w);
  });
  return g;
}

function initAICars() {
  aiCars.forEach(a => scene.remove(a.mesh));
  aiCars.length = 0;
  for (let i = 0; i < AI_COUNT; i++) {
    const mesh = buildAICar(aiColors[i % aiColors.length]);
    const startZ = -(150 + i * 320 + Math.random() * 100);
    const lane = (i % LANE_COUNT);
    const laneX = ((lane + 0.5) / LANE_COUNT - 0.5) * (ROAD_WIDTH - 3);
    const road = getRoadAt(startZ);
    mesh.position.set(road.x + laneX, 0, startZ);
    scene.add(mesh);
    aiCars.push({
      mesh,
      z: startZ,
      lane,
      laneX,
      speed: 0.4 + Math.random() * 0.5,
      wobblePhase: Math.random() * Math.PI * 2,
      direction: -1
    });
  }
}
initAICars();

// ─────────────────────────────────────────────
//  CONTROLS – KEYBOARD
// ─────────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (state === 'start' && (e.key === 'Enter' || e.key === ' ')) { startCountdown(); return; }
  if (e.key === 'ArrowUp'    || e.key === 'w' || e.key === 'W') keys.up = true;
  if (e.key === 'ArrowDown'  || e.key === 's' || e.key === 'S') keys.down = true;
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') keys.left = true;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
});
window.addEventListener('keyup', e => {
  if (e.key === 'ArrowUp'    || e.key === 'w' || e.key === 'W') keys.up = false;
  if (e.key === 'ArrowDown'  || e.key === 's' || e.key === 'S') keys.down = false;
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') keys.left = false;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
});

// ─────────────────────────────────────────────
//  CONTROLS – TOUCH
// ─────────────────────────────────────────────
const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

document.querySelectorAll('.tbtn').forEach(btn => {
  const k = btn.dataset.key;
  const onDown = e => { e.preventDefault(); keys[k] = true;  btn.classList.add('pressed'); };
  const onUp   = e => { e.preventDefault(); keys[k] = false; btn.classList.remove('pressed'); };
  btn.addEventListener('touchstart', onDown, { passive: false });
  btn.addEventListener('touchend',   onUp,   { passive: false });
  btn.addEventListener('touchcancel', onUp,   { passive: false });
  btn.addEventListener('mousedown', onDown);
  btn.addEventListener('mouseup',   onUp);
  btn.addEventListener('mouseleave', onUp);
});

// Start on tap (overlay)
document.getElementById('overlay').addEventListener('click', () => {
  if (state === 'start') startCountdown();
});
document.getElementById('playAgainBtn').addEventListener('click', resetGame);

// ─────────────────────────────────────────────
//  ORIENTATION CHECK
// ─────────────────────────────────────────────
function checkOrientation() {
  const rotMsg = document.getElementById('rotate-msg');
  if (isTouchDevice && window.innerHeight > window.innerWidth && window.innerWidth < 600) {
    rotMsg.style.display = 'flex';
  } else {
    rotMsg.style.display = 'none';
  }
  if (isTouchDevice) {
    document.getElementById('touch-controls').classList.add('visible');
  }
}
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  checkOrientation();
});
checkOrientation();

// ─────────────────────────────────────────────
//  GAME STATE TRANSITIONS
// ─────────────────────────────────────────────
function startCountdown() {
  state = 'countdown';
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('minimap').classList.remove('hidden');
  updateBestDisplay();
  let count = 3;
  const cdEl = document.getElementById('countdown');
  const tick = () => {
    if (count > 0) {
      cdEl.innerHTML = `<span>${count}</span>`;
      count--;
      setTimeout(tick, 800);
    } else {
      cdEl.innerHTML = '<span style="color:#ffe66d">GO!</span>';
      setTimeout(() => { cdEl.innerHTML = ''; state = 'racing'; }, 600);
    }
  };
  tick();
}

function finishRace() {
  state = 'finish';
  const t = clock;
  document.getElementById('finishTime').textContent = `Time: ${t.toFixed(2)}s`;
  if (t < bestTime) {
    bestTime = t;
    localStorage.setItem('superasia_best', bestTime.toFixed(2));
  }
  document.getElementById('finishBest').textContent = `Best: ${bestTime.toFixed(2)}s`;
  document.getElementById('finishScreen').classList.remove('hidden');
}

function resetGame() {
  document.getElementById('finishScreen').classList.add('hidden');
  speed = 0; steerAngle = 0; clock = 0;
  playerCar.position.set(roadXOffset(0), 0, 0);
  playerCar.rotation.y = 0;
  initAICars();
  updateBestDisplay();
  startCountdown();
}

function updateBestDisplay() {
  document.getElementById('hudBest').textContent =
    bestTime < Infinity ? `Best: ${bestTime.toFixed(2)}s` : 'Best: --';
}

// ─────────────────────────────────────────────
//  COLLISION FLASH
// ─────────────────────────────────────────────
function triggerFlash() {
  const fl = document.getElementById('flash');
  fl.classList.add('active');
  setTimeout(() => fl.classList.remove('active'), 200);
}

// ─────────────────────────────────────────────
//  MINIMAP
// ─────────────────────────────────────────────
const mmCanvas = document.getElementById('minimapCanvas');
const mmCtx = mmCanvas.getContext('2d');
mmCanvas.width = 80; mmCanvas.height = 220;

function drawMinimap() {
  mmCtx.clearRect(0, 0, 80, 220);
  const scale = 200 / TRACK_LENGTH;
  const cx = 40;

  // Road
  mmCtx.strokeStyle = '#666'; mmCtx.lineWidth = 6;
  mmCtx.beginPath();
  for (let i = 0; i <= roadSegs; i += 4) {
    const p = roadPoints[i];
    const mx = cx + p.x * scale * 0.4;
    const my = 210 + p.z * scale;
    if (i === 0) mmCtx.moveTo(mx, my); else mmCtx.lineTo(mx, my);
  }
  mmCtx.stroke();

  // AI dots
  mmCtx.fillStyle = '#f00';
  aiCars.forEach(ai => {
    const mx = cx + ai.mesh.position.x * scale * 0.4;
    const my = 210 + ai.mesh.position.z * scale;
    mmCtx.beginPath(); mmCtx.arc(mx, my, 2.5, 0, Math.PI*2); mmCtx.fill();
  });

  // Player dot
  mmCtx.fillStyle = '#ff69b4';
  const px = cx + playerCar.position.x * scale * 0.4;
  const py = 210 + playerCar.position.z * scale;
  mmCtx.beginPath(); mmCtx.arc(px, py, 3.5, 0, Math.PI*2); mmCtx.fill();

  // Finish
  mmCtx.fillStyle = '#ffe66d';
  const fy = 210 + FINISH_Z * scale;
  mmCtx.fillRect(cx - 15, fy - 1, 30, 2);
}

// ─────────────────────────────────────────────
//  GAME LOOP
// ─────────────────────────────────────────────
let prevTime = performance.now();

function gameLoop(now) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min((now - prevTime) / 16.667, 3);
  prevTime = now;

  if (state === 'racing') {
    clock += dt * (16.667 / 1000);

    // ── PLAYER PHYSICS ──
    if (keys.up)   speed = Math.min(speed + accel * dt, maxSpeed);
    if (keys.down)  speed = Math.max(speed - brakeForce * dt, -0.4);
    if (!keys.up && !keys.down) {
      if (speed > 0) speed = Math.max(speed - friction * dt, 0);
      else if (speed < 0) speed = Math.min(speed + friction * dt, 0);
    }

    if (keys.left)  steerAngle = Math.min(steerAngle + steerSpeed * dt, 1);
    if (keys.right) steerAngle = Math.max(steerAngle - steerSpeed * dt, -1);
    if (!keys.left && !keys.right) {
      if (steerAngle > 0) steerAngle = Math.max(steerAngle - steerReturn * dt, 0);
      else steerAngle = Math.min(steerAngle + steerReturn * dt, 0);
    }

    const turnRate = steerAngle * 0.03 * speed * dt;
    playerCar.rotation.y += turnRate;

    const dir = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0,1,0), playerCar.rotation.y);
    playerCar.position.addScaledVector(dir, speed * dt);

    // Road boundaries
    const road = getRoadAt(playerCar.position.z);
    const hw = ROAD_WIDTH / 2 - 1.2;
    const offRoad = playerCar.position.x - road.x;
    if (offRoad >  hw) { playerCar.position.x = road.x + hw; speed *= 0.95; }
    if (offRoad < -hw) { playerCar.position.x = road.x - hw; speed *= 0.95; }

    // ── AI CARS ──
    for (const ai of aiCars) {
      ai.z -= ai.speed * dt;
      if (ai.z < FINISH_Z - 50) ai.z = 50;
      if (ai.z > 50) ai.z = -TRACK_LENGTH * 0.5;

      const aRoad = getRoadAt(ai.z);
      const wobble = Math.sin(now * 0.001 + ai.wobblePhase) * 0.6;
      const targetX = aRoad.x + ((ai.lane + 0.5) / LANE_COUNT - 0.5) * (ROAD_WIDTH - 3) + wobble;

      ai.mesh.position.x += (targetX - ai.mesh.position.x) * 0.05 * dt;
      ai.mesh.position.z = ai.z;

      const aNext = getRoadAt(ai.z - 5);
      ai.mesh.rotation.y = Math.atan2(aNext.x - ai.mesh.position.x, -5);
    }

    // ── COLLISION DETECTION ──
    const pBox = new THREE.Box3().setFromObject(playerCar);
    pBox.expandByScalar(-0.3);
    for (const ai of aiCars) {
      const aBox = new THREE.Box3().setFromObject(ai.mesh);
      if (pBox.intersectsBox(aBox) && (now - lastCollisionTime > COLLISION_CD)) {
        lastCollisionTime = now;
        speed *= 0.25;
        triggerFlash();
      }
    }

    // ── FINISH CHECK ──
    if (playerCar.position.z <= FINISH_Z) {
      finishRace();
    }

    // ── HUD UPDATE ──
    const displaySpeed = Math.abs(speed * 100).toFixed(0);
    const dist = Math.max(0, (-FINISH_Z + playerCar.position.z)).toFixed(0);
    document.getElementById('hudSpeed').textContent  = `Speed: ${displaySpeed} km/h`;
    document.getElementById('hudDist').textContent   = `Distance: ${dist}m`;
    document.getElementById('hudTimer').textContent  = `${clock.toFixed(2)}s`;
  }

  // ── AI IDLE ANIMATION (non-racing) ──
  if (state !== 'racing') {
    for (const ai of aiCars) {
      ai.mesh.position.x += Math.sin(now * 0.0005 + ai.wobblePhase) * 0.005;
    }
  }

  // ── CAMERA ──
  const camTarget = playerCar.position.clone();
  const camBack = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0,1,0), playerCar.rotation.y);
  const idealPos = camTarget.clone().add(camBack.multiplyScalar(12)).add(new THREE.Vector3(0, 6, 0));
  camera.position.lerp(idealPos, 0.06 * dt);
  const lookTarget = playerCar.position.clone().add(new THREE.Vector3(0, 1.5, 0));
  camera.lookAt(lookTarget);

  // Sun follows player
  sun.position.set(playerCar.position.x + 50, 80, playerCar.position.z + 30);
  sun.target.position.copy(playerCar.position);
  sun.target.updateMatrixWorld();

  drawMinimap();
  renderer.render(scene, camera);
}

// Init camera and player pos
playerCar.position.set(roadXOffset(0), 0, 0);
camera.position.set(playerCar.position.x, 8, playerCar.position.z + 14);

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
